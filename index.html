// PREMIUM FEATURE 9: 3D CARD TILT
// ══════════════════════════════════════════════
const applyTilt = (e, card) => {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const maxTilt = 8;
  card.style.transform = `perspective(700px) rotateY(${dx * maxTilt}deg) rotateX(${-dy * maxTilt}deg) translateZ(4px) translateY(-8px) scale(1.01)`;
  const shine = card.querySelector('.tilt-shine');
  if (shine) {
    const mx = ((e.clientX - rect.left) / rect.width) * 100;
    const my = ((e.clientY - rect.top) / rect.height) * 100;
    shine.style.setProperty('--mx', mx + '%');
    shine.style.setProperty('--my', my + '%');
  }
};
const resetTilt = (card) => {
  card.style.transform = '';
};
document.body.addEventListener('mousemove', e => {
  const card = e.target.closest('.tilt-card');
  if (card) applyTilt(e, card);
});
document.body.addEventListener('mouseleave', e => {
  const card = e.target.closest('.tilt-card');
  if (card) resetTilt(card);
}, true);
document.body.addEventListener('mouseout', e => {
  if (e.target.classList.contains('tilt-card')) resetTilt(e.target);
});

const timeAgoStr = (date) => {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
};

// ══════════════════════════════════════════════
// NEW FEATURE: RECOMMENDATION SYSTEM
// ══════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// ░░░  RECOMMENDATION ENGINE v2  ░░░
//
//  Signals used (with weights):
//    1. Category affinity       — built from views, cart adds, purchases
//    2. Price range affinity    — learned from viewing/buying history
//    3. Keyword affinity        — token overlap between interests & product name
//    4. Recency decay           — recent interactions count more than old ones
//    5. Freshness bonus         — brand-new listings get a boost
//    6. Popularity proxy        — items wishlisted by the user get a boost
//    7. Diversity injection     — ensures multiple categories appear
//    8. Seller diversity        — avoids showing only one seller's items
// ═══════════════════════════════════════════════════════════

const REC = {
  // Action weights — how much each action boosts a category/keyword
  WEIGHTS: { view:1, wishlist:4, cart:6, buy:10, review:3, offer:5 },
  // Recency half-life in ms — interest halves every N days
  HALF_LIFE_MS: 3 * 24 * 60 * 60 * 1000,  // 3 days
  // How many items to return
  TOP_N: 8,
  STORAGE: {
    EVENTS: 'vm_rec_events',    // raw event log
    PROFILE: 'vm_rec_profile',  // computed affinity profile
  }
};

// ── Event logging ─────────────────────────────────────────
const recLog = (product, action) => {
  if (!product) return;
  const events = JSON.parse(localStorage.getItem(REC.STORAGE.EVENTS) || '[]');
  events.unshift({
    id: product.id,
    name: product.name,
    category: product.category || 'Other',
    price: product.price || 0,
    imageUrl: product.imageUrl || '',
    action,
    t: Date.now()
  });
  // Keep last 100 raw events
  localStorage.setItem(REC.STORAGE.EVENTS, JSON.stringify(events.slice(0, 100)));
  rebuildProfile();
};

// Legacy compatibility shims
const trackUserInterest = (label, action='view') => {};  // replaced by recLog
const trackBrowse = (product) => { if (product) recLog(product, 'view'); };

// ── Profile builder ───────────────────────────────────────
// Rebuilds the affinity profile from raw events with recency decay
const rebuildProfile = () => {
  const events = JSON.parse(localStorage.getItem(REC.STORAGE.EVENTS) || '[]');
  const now = Date.now();
  const profile = {
    categories: {},   // category → weighted score
    pricePoints: [],  // recent prices for price-range model
    keywords: {},     // token → weighted score
    seenIds: new Set(),
  };

  events.forEach(ev => {
    const age = now - ev.t;
    // Recency decay: score × 2^(-age / half_life)
    const decay = Math.pow(2, -age / REC.HALF_LIFE_MS);
    const w = (REC.WEIGHTS[ev.action] || 1) * decay;

    // Category affinity
    const cat = (ev.category || 'other').toLowerCase();
    profile.categories[cat] = (profile.categories[cat] || 0) + w;

    // Price range (use last 20 priced events)
    if (ev.price > 0 && profile.pricePoints.length < 20) {
      profile.pricePoints.push(ev.price);
    }

    // Keyword affinity — split name into tokens, weight each
    const tokens = (ev.name || '').toLowerCase()
      .replace(/[^a-z0-9ऀ-ॿ ]/g, '')
      .split(/\s+/)
      .filter(t => t.length > 2);  // ignore 1-2 char words
    tokens.forEach(t => {
      profile.keywords[t] = (profile.keywords[t] || 0) + w * 0.5;
    });

    profile.seenIds.add(ev.id);
  });

  // Compute price range: mean ± 1 std-dev
  if (profile.pricePoints.length > 0) {
    const mean = profile.pricePoints.reduce((s, p) => s + p, 0) / profile.pricePoints.length;
    const variance = profile.pricePoints.reduce((s, p) => s + Math.pow(p - mean, 2), 0) / profile.pricePoints.length;
    const std = Math.sqrt(variance);
    profile.priceMean = mean;
    profile.priceStd = std || mean * 0.5;  // fallback
  }

  profile.seenIds = [...profile.seenIds];  // serialize Set → Array
  localStorage.setItem(REC.STORAGE.PROFILE, JSON.stringify(profile));
};

// ── Scorer ────────────────────────────────────────────────
const scoreProduct = (product, profile, wishlist) => {
  const now = Date.now();
  let score = 0;
  const reasons = [];

  // 1. Category affinity (0–30 pts)
  const cat = (product.category || 'other').toLowerCase();
  const catScore = (profile.categories[cat] || 0) * 3;
  if (catScore > 0) {
    score += Math.min(catScore, 30);
    reasons.push({ label: cat, pts: Math.min(catScore, 30) });
  }

  // 2. Keyword affinity (0–20 pts)
  const tokens = (product.name || '').toLowerCase()
    .replace(/[^a-z0-9ऀ-ॿ ]/g, '')
    .split(/\s+/)
    .filter(t => t.length > 2);
  let kwScore = 0;
  tokens.forEach(t => { kwScore += (profile.keywords[t] || 0); });
  if (kwScore > 0) {
    score += Math.min(kwScore * 2, 20);
    reasons.push({ label: 'keyword match', pts: Math.min(kwScore * 2, 20) });
  }

  // 3. Price range affinity (0–15 pts)
  if (profile.priceMean && product.price > 0) {
    const dist = Math.abs(product.price - profile.priceMean);
    const tolerance = profile.priceStd * 1.5;
    if (dist <= tolerance) {
      const pts = 15 * (1 - dist / tolerance);
      score += pts;
      reasons.push({ label: 'price match', pts: Math.round(pts) });
    }
  }

  // 4. Freshness bonus — items < 48h old get up to 10 pts
  const ageMs = now - (product.createdAt?.toMillis?.() || 0);
  if (ageMs < 48 * 3600000) {
    const freshPts = 10 * (1 - ageMs / (48 * 3600000));
    score += freshPts;
    reasons.push({ label: 'new listing', pts: Math.round(freshPts) });
  }

  // 5. Wishlist boost — if user already saved it
  if (wishlist.includes(product.id)) {
    score += 8;
    reasons.push({ label: 'in wishlist', pts: 8 });
  }

  // 6. Tradeable bonus — if user has engaged with trade section
  if (product.isTradeable && (profile.categories['trade'] || 0) > 0) {
    score += 3;
  }

  return { score, reasons };
};

// ── Main recommendation getter ────────────────────────────
const getRecommendations = (limit = REC.TOP_N) => {
  rebuildProfile();
  const profile = JSON.parse(localStorage.getItem(REC.STORAGE.PROFILE) || '{}');
  const seenIds = new Set(profile.seenIds || []);
  const wishlist = JSON.parse(localStorage.getItem('vitmart_wishlist') || '[]');

  const candidates = products.filter(p =>
    p.status === 'available' &&
    p.sellerId !== currentUser?.uid
  );

  if (candidates.length === 0) return [];

  // Score every candidate
  const scored = candidates.map(p => {
    const { score, reasons } = scoreProduct(p, profile, wishlist);
    // Slight penalty for already-seen items (still show them, just lower)
    const seenPenalty = seenIds.has(p.id) ? 0.6 : 1.0;
    return { ...p, recScore: score * seenPenalty, recReasons: reasons };
  }).sort((a, b) => b.recScore - a.recScore);

  // ── Diversity pass ──────────────────────────────────────
  // Ensure we don't show 6 items from the same category or seller.
  // Use a greedy fill: pick top item, then pick next best that adds diversity.
  const result = [];
  const catCount = {};
  const sellerCount = {};
  const MAX_PER_CAT = 2;
  const MAX_PER_SELLER = 2;

  // First pass: fill from top scored with diversity
  for (const p of scored) {
    if (result.length >= limit) break;
    const cat = p.category || 'Other';
    const seller = p.sellerId;
    if ((catCount[cat] || 0) >= MAX_PER_CAT) continue;
    if ((sellerCount[seller] || 0) >= MAX_PER_SELLER) continue;
    result.push(p);
    catCount[cat] = (catCount[cat] || 0) + 1;
    sellerCount[seller] = (sellerCount[seller] || 0) + 1;
  }

  // Second pass: fill remaining slots with best available (relax diversity)
  if (result.length < Math.min(limit, candidates.length)) {
    const resultIds = new Set(result.map(p => p.id));
    for (const p of scored) {
      if (result.length >= limit) break;
      if (!resultIds.has(p.id)) result.push(p);
    }
  }

  return result;
};

// ── Why recommended label ─────────────────────────────────
const getRecReasonLabel = (product) => {
  if (!product.recReasons || product.recReasons.length === 0) return 'New';
  const top = product.recReasons.sort((a, b) => b.pts - a.pts)[0];
  const labels = {
    'new listing': '🆕 Just listed',
    'in wishlist': '❤️ Saved',
    'keyword match': '🔍 Matches interests',
    'price match': '💰 In your range',
    'books': '📚 You like Books',
    'electronics': '💻 You browse Electronics',
    'furniture': '🪑 You like Furniture',
    'clothing': '👗 You like Clothing',
    'stationery': '✏️ You like Stationery',
    'sports gear': '⚽ You like Sports Gear',
    'services': '🛠️ You like Services',
    'other': '✨ Recommended',
  };
  return labels[top.label] || `🔁 Based on ${top.label}`;
};

          <button type="submit" class="px-6 py-2.5 bg-gradient-to-r from-vit-600 to-cyan-500 text-white rounded-xl font-bold shimmer-btn shadow-lg shadow-vit-500/30 hover:-translate-y-0.5 transition-transform">
            Post Notice 📌
          </button>
        </div>
      </form>
    </div>

    <!-- Filter pills -->
    <div class="flex flex-wrap gap-2 mb-6" id="notice-filter-bar">
      <button class="cat-pill active" data-filter="all">All Posts</button>
      ${Object.entries(NOTICE_TAGS).map(([k,v])=>`<button class="cat-pill" data-filter="${k}">${v.icon} ${v.label}</button>`).join('')}
    </div>

    <!-- Live feed -->
    <div id="notice-feed" class="space-y-4">
      <div class="text-center py-12 text-gray-400">Loading notices…</div>
    </div>`;

  // char counter
  const bodyTa = c.querySelector('#notice-body');
  const charCnt = c.querySelector('#notice-char-count');
  bodyTa.addEventListener('input', () => { charCnt.textContent = `${bodyTa.value.length} / 500`; });

  // tag selector styling
  const tagRadios = c.querySelectorAll('.notice-tag-radio');
  const highlightSelected = () => {
    tagRadios.forEach(label => {
      const inp = label.querySelector('input');
      const btn = label.querySelector('.notice-tag-btn');
      if (inp.checked) {
        btn.classList.add('border-vit-500','bg-vit-50','dark:bg-vit-900/20','shadow-lg');
      } else {
        btn.classList.remove('border-vit-500','bg-vit-50','dark:bg-vit-900/20','shadow-lg');
      }
    });
  };
  tagRadios.forEach(label => { label.addEventListener('change', highlightSelected); });
  highlightSelected();

  // filter
  let activeNoticeFilter = 'all';
  let allNotices = [];
  c.querySelector('#notice-filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.cat-pill');
    if (!btn) return;
    c.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeNoticeFilter = btn.dataset.filter;
    renderNoticeFeed(allNotices, activeNoticeFilter);
  });

  // live listener
  noticeUnsubscribe();
  noticeUnsubscribe = db.collection('noticeboard').orderBy('createdAt','desc').limit(60).onSnapshot(snap => {
    allNotices = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderNoticeFeed(allNotices, activeNoticeFilter);
  });

  // submit
  c.querySelector('#notice-form').addEventListener('submit', async e => {
    e.preventDefault();
    const tag = c.querySelector('input[name="notice-tag"]:checked')?.value || 'general';
    const title = c.querySelector('#notice-title').value.trim();
    const body = filterProfanity(c.querySelector('#notice-body').value.trim());
    if (!title || !body) return;
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mx-auto"></div>`;
    try {
      await db.collection('noticeboard').add({
        tag, title, body,
        authorId: currentUser.uid,
        authorName: currentUser.displayName || 'Student',
        authorPhoto: currentUser.photoURL || null,
        replyCount: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showMessage('Notice posted! 📌', 'success');
      e.target.reset(); charCnt.textContent = '0 / 500'; highlightSelected();
    } catch(err) { showMessage('Error: '+err.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML='Post Notice 📌'; }
  });
};

const renderNoticeFeed = (notices, filter='all') => {
  const feed = document.getElementById('notice-feed');
  if (!feed) return;
  const list = filter==='all' ? notices : notices.filter(n => n.tag===filter);
  if (list.length===0) {
    feed.innerHTML=`<div class="text-center py-16 text-gray-400"><div class="text-5xl mb-3">📌</div><p class="font-medium">No notices yet. Be the first to post!</p></div>`;
    return;
  }
  feed.innerHTML = list.map(n => {
    const tag = NOTICE_TAGS[n.tag] || NOTICE_TAGS.general;
    const initials = (n.authorName||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const avatar = n.authorPhoto
      ? `<img src="${n.authorPhoto}" class="w-9 h-9 rounded-xl object-cover flex-shrink-0">`
      : `<div class="w-9 h-9 rounded-xl bg-gradient-to-br from-vit-500 to-cyan-500 flex items-center justify-center text-white font-bold text-xs flex-shrink-0">${initials}</div>`;
    const canDelete = currentUser && n.authorId===currentUser.uid;
    const ts = n.createdAt ? timeAgoStr(n.createdAt.toDate ? n.createdAt.toDate() : new Date(n.createdAt)) : 'just now';
    return `
    <div class="notice-card" data-notice-id="${n.id}">
      <div class="p-5">
        <div class="flex items-start justify-between gap-3 mb-3">
          <div class="flex items-center gap-3">
            ${avatar}
            <div>
              <p class="font-bold text-sm text-gray-900 dark:text-white">${n.authorName}</p>
              <p class="text-xs text-gray-400">${ts}</p>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="notice-tag ${tag.cls}">${tag.icon} ${tag.label}</span>
            ${canDelete?`<button class="delete-notice-btn text-gray-300 hover:text-rose-500 transition-colors p-1 rounded-lg" data-id="${n.id}" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>`:''}
          </div>
        </div>
        <h3 class="font-black text-gray-900 dark:text-white text-base mb-1">${n.title}</h3>
        <p class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed">${n.body}</p>
        <div class="mt-4 flex items-center gap-3">
          <button class="expand-replies-btn reply-count-chip ${(n.replyCount||0)>0?'has-replies':''} flex items-center gap-1.5 text-xs font-bold hover:opacity-80 transition-all" data-notice-id="${n.id}">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span id="reply-count-${n.id}">${(n.replyCount||0)>0 ? `${n.replyCount} ${n.replyCount===1?'reply':'replies'}` : 'Reply'}</span>
          </button>

        </div>
      </div>
      <!-- Replies section -->
      <div class="replies-container replies-panel" id="replies-container-${n.id}">
        <div id="replies-list-${n.id}" class="px-5 pt-3 space-y-2"></div>
        <div class="reply-input-row">
          <input type="text" class="reply-input vit-input flex-grow" placeholder="Write a reply…" maxlength="300" data-notice-id="${n.id}">
          <button type="button" class="reply-submit-btn" data-notice-id="${n.id}" title="Send reply">
            <svg fill="currentColor" viewBox="0 0 20 20" transform="rotate(90)"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Expand/collapse replies
  feed.querySelectorAll('.expand-replies-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const nid = btn.dataset.noticeId;
      const container = document.getElementById(`replies-container-${nid}`);
      const isOpen = container.classList.contains('open');
      // Haptic-feel: scale the button briefly
      btn.style.transform = 'scale(0.9)';
      requestAnimationFrame(() => { btn.style.transform = ''; });
      if (isOpen) {
        container.classList.remove('open');
        if (currentNoticeRepliesUnsubs[nid]) { currentNoticeRepliesUnsubs[nid](); delete currentNoticeRepliesUnsubs[nid]; }
      } else {
        container.classList.add('open');
        listenReplies(nid);
        // Focus the input after animation
        setTimeout(() => {
          const inp = document.querySelector(`.reply-input[data-notice-id="${nid}"]`);
          inp?.focus();
        }, 260);
      }
    });
  });

  // Reply submit buttons (new button-based UI)
  const submitReply = async (nid, inp, btn) => {
    const text = filterProfanity(inp.value.trim());
    if (!text) { inp.focus(); return; }
    const origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" opacity="0.3"/><path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
    try {
      const batch = db.batch();
      const replyRef = db.collection('noticeboard').doc(nid).collection('replies').doc();
      batch.set(replyRef, {
        text, authorId: currentUser.uid, authorName: currentUser.displayName||'Student',
        authorPhoto: currentUser.photoURL||null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      batch.update(db.collection('noticeboard').doc(nid), { replyCount: firebase.firestore.FieldValue.increment(1) });
      await batch.commit();
      inp.value = '';
      // Update count chip immediately (optimistic)
      const countEl = document.getElementById(`reply-count-${nid}`);
      const countBtn = document.querySelector(`.expand-replies-btn[data-notice-id="${nid}"]`);
      if (countBtn) countBtn.classList.add('has-replies');
    } catch(err) { showMessage('Error: '+err.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML=origHTML; }
  };

  feed.querySelectorAll('.reply-submit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const nid = btn.dataset.noticeId;
      const inp = feed.querySelector(`.reply-input[data-notice-id="${nid}"]`);
      if (inp) submitReply(nid, inp, btn);
    });
  });

  // Also submit on Enter key in reply input
  feed.querySelectorAll('.reply-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const nid = inp.dataset.noticeId;
        const btn = feed.querySelector(`.reply-submit-btn[data-notice-id="${nid}"]`);
        if (btn) submitReply(nid, inp, btn);
      }
    });
    // Auto-open replies section when user starts typing
    inp.addEventListener('focus', () => {
      const nid = inp.dataset.noticeId;
      const container = document.getElementById(`replies-container-${nid}`);
      if (container && !container.classList.contains('open')) {
        container.classList.add('open');
        listenReplies(nid);
      }
    });
  });

  // Delete notice
  feed.querySelectorAll('.delete-notice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      showConfirmModal('Delete this notice?', async () => {
        try { await db.collection('noticeboard').doc(btn.dataset.id).delete(); showMessage('Deleted.','success'); }
        catch(err) { showMessage('Error.','error'); }
      });
    });
  });

};

const listenReplies = (noticeId) => {
  if (currentNoticeRepliesUnsubs[noticeId]) return;
  const listEl = document.getElementById(`replies-list-${noticeId}`);
  if (!listEl) return;
  currentNoticeRepliesUnsubs[noticeId] = db.collection('noticeboard').doc(noticeId)
    .collection('replies').orderBy('createdAt','asc').limit(30)
    .onSnapshot(snap => {
      if (!snap.docs.length) { listEl.innerHTML=`<p class="text-xs text-gray-400">No replies yet. Be the first!</p>`; return; }
      listEl.innerHTML = snap.docs.map((d, i) => {
        const r = d.data();
        const initials = (r.authorName||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        const av = r.authorPhoto
          ? `<img src="${r.authorPhoto}" class="w-7 h-7 rounded-lg object-cover flex-shrink-0">`
          : `<div class="w-7 h-7 rounded-lg bg-gradient-to-br from-vit-500 to-cyan-500 flex items-center justify-center text-white font-bold text-xs flex-shrink-0">${initials}</div>`;
        const ts = r.createdAt ? timeAgoStr(r.createdAt.toDate ? r.createdAt.toDate() : new Date()) : '';
        const mine = r.authorId === currentUser?.uid;
        return `<div class="reply-bubble flex items-start gap-2" style="opacity:0;transform:translateY(4px);animation:reply-in 0.18s ease forwards;animation-delay:${i*40}ms">
          ${av}
          <div class="flex-grow min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-bold text-xs text-gray-800 dark:text-gray-200">${r.authorName}</span>
              <span class="text-xs text-gray-400">${ts}</span>
              ${mine ? `<button class="delete-reply-btn text-gray-300 hover:text-rose-500 transition-colors ml-auto text-xs" data-notice-id="${noticeId}" data-reply-id="${d.id}">✕</button>` : ''}
            </div>
            <p class="text-sm text-gray-700 dark:text-gray-300 mt-0.5 leading-relaxed">${r.text}</p>
          </div>
        </div>`;
      }).join('');
      // delete reply handlers
      listEl.querySelectorAll('.delete-reply-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            const batch = db.batch();
            batch.delete(db.collection('noticeboard').doc(btn.dataset.noticeId).collection('replies').doc(btn.dataset.replyId));
            batch.update(db.collection('noticeboard').doc(btn.dataset.noticeId), { replyCount: firebase.firestore.FieldValue.increment(-1) });
            await batch.commit();
          } catch(err) { showMessage('Error.','error'); }
        });
      });
    });
};

// ░░░  PRICE NEGOTIATION  ░░░

const renderPriceOfferModal = (product) => {
  const modal = document.getElementById('price-offer-modal');
  const content = document.getElementById('price-offer-modal-content');
  content.innerHTML = `
    <div class="text-center mb-5">
      <div class="w-14 h-14 bg-gradient-to-br from-amber-400 to-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-3 text-2xl shadow-lg">🤝</div>
      <h2 class="text-2xl font-black text-gray-900 dark:text-white">Make an Offer</h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Seller's price: <span class="font-black grad-text-vp text-lg">₹${product.price.toFixed(0)}</span></p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Your Offer (₹)</label>
        <input type="number" id="offer-price-input" class="vit-input text-xl font-black" placeholder="Enter your price" min="1" max="${product.price * 2}">
        <p class="text-xs text-gray-400 mt-1">Suggest a fair price — seller can accept, counter, or decline</p>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Message (optional)</label>
        <textarea id="offer-message-input" class="vit-input resize-none text-sm" rows="2" placeholder="e.g. 'Can you do ₹800? I'll pick up today.'"></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button id="cancel-price-offer-btn" class="flex-1 py-2.5 glass rounded-xl font-bold text-sm hover:-translate-y-0.5 transition-transform">Cancel</button>
        <button id="submit-price-offer-btn" class="flex-1 py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-white rounded-xl font-bold shimmer-btn shadow-lg shadow-amber-500/30">Send Offer 🤝</button>
      </div>
    </div>`;
  modal.classList.add('show');

  content.querySelector('#cancel-price-offer-btn').onclick = () => modal.classList.remove('show');
  content.querySelector('#submit-price-offer-btn').onclick = async () => {
    const offerPrice = parseFloat(content.querySelector('#offer-price-input').value);
    const msg = content.querySelector('#offer-message-input').value.trim();
    if (!offerPrice || offerPrice <= 0) { showMessage('Enter a valid offer price.','error'); return; }
    const btn = content.querySelector('#submit-price-offer-btn');
    btn.disabled=true; btn.innerHTML=`<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mx-auto"></div>`;
    try {
      await db.collection('products').doc(product.id).collection('price_offers').add({
        offerPrice, message: filterProfanity(msg),
        buyerId: currentUser.uid, buyerName: currentUser.displayName||'Buyer',
        buyerPhoto: currentUser.photoURL||null, buyerEmail: currentUser.email,
        originalPrice: product.price, status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      // Notify the seller directly here (most reliable approach)
      if (product.sellerId && product.sellerId !== currentUser.uid) {
        sendNotification(product.sellerId, {
          type: 'price_offer',
          title: '💰 New Price Offer!',
          body: `${currentUser.displayName || 'Someone'} offered ₹${offerPrice} for "${product.name}".`,
          productId: product.id
        });
      }
      showMessage('Offer sent! The seller will see your offer on their listing.','success');
      modal.classList.remove('show');
    } catch(err) { showMessage('Error: '+err.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML='Send Offer 🤝'; }
  };
};

// show price offers to seller on product detail
const renderPriceOffersSection = (productId, containerId) => {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = `<div class="glass p-6 rounded-2xl mt-6">
    <h3 class="text-lg font-black text-gray-900 dark:text-white mb-1">💰 Price Offers Received</h3>
    <p class="text-xs text-gray-400 mb-4">Accept, decline, or send a counter-price. Counter offers go to the buyer only — your listing price stays unchanged.</p>
    <div id="price-offers-list" class="space-y-3"><p class="text-gray-400 text-sm">Loading…</p></div>
  </div>`;
  const list = document.getElementById('price-offers-list');
  db.collection('products').doc(productId).collection('price_offers')
    .orderBy('createdAt','desc').limit(20).onSnapshot(snap => {
      if (snap.empty) { list.innerHTML=`<p class="text-gray-400 text-sm">No price offers yet.</p>`; return; }
      list.innerHTML = snap.docs.map(d => {
        const o = {id:d.id,...d.data()};
        const initials = (o.buyerName||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        const av = o.buyerPhoto
          ? `<img src="${o.buyerPhoto}" class="w-10 h-10 rounded-xl object-cover flex-shrink-0">`
          : `<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-vit-500 to-cyan-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">${initials}</div>`;

        // Status badge
        const statusBadge = o.status === 'accepted'
          ? `<span class="offer-status-accepted">✅ Accepted</span>`
          : o.status === 'rejected'
          ? `<span class="offer-status-rejected">❌ Declined</span>`
          : o.status === 'countered'
          ? `<span style="color:#8b5cf6;font-weight:700;font-size:11px">💬 Counter Sent</span>`
          : `<span class="offer-status-pending">⏳ Pending</span>`;

        // Counter price display (only shown when a counter was sent)
        const counterInfo = o.counterPrice
          ? `<p class="text-xs mt-1" style="color:#8b5cf6;font-weight:600">Your counter: ₹${o.counterPrice}</p>`
          : '';

        // Action buttons — only on pending offers
        const actions = o.status === 'pending' ? `
          <div class="flex gap-1.5 mt-2 flex-wrap justify-end">
            <button class="reject-price-offer-btn px-2.5 py-1 text-xs bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-lg font-bold hover:-translate-y-0.5 transition-transform"
              data-id="${d.id}" data-product-id="${productId}" title="Decline">✕ Decline</button>
            <button class="counter-price-offer-btn px-2.5 py-1 text-xs bg-vit-100 dark:bg-vit-900/30 text-vit-600 dark:text-vit-400 rounded-lg font-bold hover:-translate-y-0.5 transition-transform"
              data-id="${d.id}" data-product-id="${productId}" data-buyer-offer="${o.offerPrice}" title="Send counter offer">💬 Counter</button>
            <button class="accept-price-offer-btn px-2.5 py-1 text-xs bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-lg font-bold hover:-translate-y-0.5 transition-transform"
              data-id="${d.id}" data-product-id="${productId}"
              data-buyer-id="${o.buyerId}" data-buyer-name="${o.buyerName}"
              data-buyer-photo="${o.buyerPhoto||''}" data-offer-price="${o.offerPrice}" title="Accept offer">✓ Accept</button>
          </div>` : '';

        return `<div class="price-offer-item">
          ${av}
          <div class="flex-grow min-w-0">
            <p class="font-bold text-sm text-gray-900 dark:text-white">${o.buyerName}</p>
            <p class="text-xs text-gray-400 mt-0.5">${o.message || '(no message)'}</p>
            ${counterInfo}
          </div>
          <div class="text-right flex-shrink-0">
            <p class="font-black text-lg grad-text-vp">₹${o.offerPrice}</p>
            ${statusBadge}
            ${actions}
          </div>
        </div>`;
      }).join('');

      // ── Accept ───────────────────────────────────────────────────────────
      list.querySelectorAll('.accept-price-offer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          showConfirmModal(`Accept ₹${btn.dataset.offerPrice} from ${btn.dataset.buyerName}? Item will stay at its listed price — this just confirms the deal.`, async () => {
            try {
              const batch = db.batch();
              batch.update(
                db.collection('products').doc(btn.dataset.productId).collection('price_offers').doc(btn.dataset.id),
                { status: 'accepted' }
              );
              // auto-reject other pending offers on the same product
              const others = await db.collection('products').doc(btn.dataset.productId)
                .collection('price_offers').where('status','==','pending').get();
              others.docs.forEach(d2 => { if (d2.id !== btn.dataset.id) batch.update(d2.ref, {status:'rejected'}); });
              await batch.commit();
              showMessage('Offer accepted! Contact the buyer via email to finalise.', 'success');
            } catch(err) { showMessage('Error: '+err.message, 'error'); }
          });
        });
      });

      // ── Decline ──────────────────────────────────────────────────────────
      list.querySelectorAll('.reject-price-offer-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await db.collection('products').doc(btn.dataset.productId)
              .collection('price_offers').doc(btn.dataset.id)
              .update({ status: 'rejected' });
            showMessage('Offer declined.', 'success');
          } catch(err) { showMessage('Error: '+err.message, 'error'); }
        });
      });

      // ── Counter ──────────────────────────────────────────────────────────
      // IMPORTANT: counter offer only writes to the offer document.
      // It NEVER touches the product's price field — the listing price is unchanged.
      list.querySelectorAll('.counter-price-offer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const buyerOffer = parseFloat(btn.dataset.buyerOffer);

          // Build counter modal inside price-offer-modal
          const modal = document.getElementById('price-offer-modal');
          const modalContent = document.getElementById('price-offer-modal-content');
          modalContent.innerHTML = `
            <div class="text-center mb-5">

            if (v > 0) {
              preview.classList.remove('hidden');
              const diff = v - buyerOffer;
              previewText.textContent = `₹${buyerOffer} → ₹${v}  (${diff > 0 ? '+' : ''}${((diff/buyerOffer)*100).toFixed(0)}%)`;

      </div>
    </div>`;

  const inp = content.querySelector('#new-price-input');
  const preview = content.querySelector('#price-change-preview');
  const previewText = content.querySelector('#price-change-text');

      previewText.className = `font-black text-lg ${diff<0?'text-emerald-600':'text-rose-500'}`;

  });

      modal.classList.remove('show');
    } catch(err) { showMessage('Error: '+err.message,'error'); }
    finally { btn.disabled=false; btn.innerHTML='Update Price'; }

// ░░░  NOTIFICATION SYSTEM  ░░░
// ═══════════════════════════════════════════════════════════
let notifUnsubscribe = () => {};

const NOTIF_ICONS = {
  trade_offer:    { bg:'bg-emerald-100 dark:bg-emerald-900/40', icon:'🔄' },
  trade_accepted: { bg:'bg-emerald-100 dark:bg-emerald-900/40', icon:'✅' },
  purchase:       { bg:'bg-vit-100 dark:bg-vit-900/40',        icon:'🛒' },
  price_offer:    { bg:'bg-amber-100 dark:bg-amber-900/40',    icon:'💰' },
  default:        { bg:'bg-gray-100 dark:bg-gray-800',         icon:'🔔' }
};

// Write a notification document for a target user
const sendNotification = async (targetUid, { type, title, body, productId }) => {
  if (!targetUid || targetUid === currentUser?.uid) return; // don't notify yourself
  try {
    await db.collection('notifications').add({
      uid: targetUid,
      type: type || 'default',
      title,
      body,
      productId: productId || null,
      read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.warn('sendNotification failed:', e.message); }
};

// Start listening for current user's notifications
const startNotifListener = () => {
  if (!currentUser) return;
  notifUnsubscribe();
  notifUnsubscribe = db.collection('notifications')
    .where('uid', '==', currentUser.uid)
    .limit(50)
    .onSnapshot(snap => {
      // Sort client-side to avoid needing a composite Firestore index
      const notifs = snap.docs
        .map(d => ({id: d.id, ...d.data()}))
        .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0))
        .slice(0, 30);
      const unread = notifs.filter(n => !n.read).length;
      updateNotifBadge(unread);
      renderNotifList(notifs);
    }, err => console.warn('Notif listener error:', err.code));
};

const updateNotifBadge = (count) => {
  const badge = document.getElementById('notif-unread-badge');
  if (!badge) return;
  badge.style.display = count > 0 ? 'flex' : 'none';
  badge.textContent = count > 9 ? '9+' : String(count);
};

const renderNotifList = (notifs) => {
  const list = document.getElementById('notif-list');
  if (!list) return;
  if (!notifs.length) {
    list.innerHTML = '<p class="text-center text-gray-400 text-sm py-8">You\'re all caught up! 🎉</p>';
    return;
  }
  list.innerHTML = notifs.map(n => {
    const meta = NOTIF_ICONS[n.type] || NOTIF_ICONS.default;
    const ts = n.createdAt ? timeAgoStr(n.createdAt.toDate ? n.createdAt.toDate() : new Date()) : '';
    return `<div class="notif-item ${n.read ? '' : 'unread'}" data-notif-id="${n.id}" data-product-id="${n.productId || ''}" data-notif-type="${n.type || 'default'}">
      <div class="notif-icon-box ${meta.bg}">${meta.icon}</div>
      <div class="flex-grow min-w-0">
        <p class="font-bold text-sm text-gray-900 dark:text-white">${n.title}</p>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 leading-relaxed">${n.body}</p>
        <p class="text-xs text-gray-300 dark:text-gray-600 mt-1">${ts}</p>
      </div>
      <div class="flex flex-col items-end gap-1 flex-shrink-0">
        ${!n.read ? '<div class="notif-dot"></div>' : ''}
        <button class="delete-notif-btn w-5 h-5 flex items-center justify-center text-gray-300 hover:text-rose-500 transition-colors rounded-md hover:bg-rose-50 dark:hover:bg-rose-900/20" data-notif-id="${n.id}" title="Delete notification" onclick="event.stopPropagation()">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  // Delete individual notification
  list.querySelectorAll('.delete-notif-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const nid = btn.dataset.notifId;
      const item = btn.closest('.notif-item');
      // Animate out
      item.style.transition = 'opacity 0.2s, transform 0.2s, max-height 0.25s';
      item.style.opacity = '0';
      item.style.transform = 'translateX(20px)';
      item.style.maxHeight = item.offsetHeight + 'px';
      setTimeout(() => {
        item.style.maxHeight = '0';
        item.style.overflow = 'hidden';
        item.style.padding = '0';
        item.style.borderBottom = 'none';
      }, 180);
      setTimeout(() => item.remove(), 400);
      // Delete from Firestore
      db.collection('notifications').doc(nid).delete().catch(() => {});
    });
  });

  list.querySelectorAll('.notif-item').forEach(item => {
    item.addEventListener('click', async () => {
      // Mark as read
      if (item.classList.contains('unread')) {
        db.collection('notifications').doc(item.dataset.notifId).update({ read: true }).catch(() => {});
        item.classList.remove('unread');
        item.querySelector('.notif-dot')?.remove();
      }
      closeNotifDropdown();

      const type = item.dataset.notifType;
      const pid  = item.dataset.productId;

      // Route based on notification type
      if (type === 'purchase' || type === 'trade_accepted') {
        // Seller got a purchase / buyer's trade was accepted → open orders
        // Force a fresh fetch so the new order appears immediately
        db.collection('orders').where('userId','==',currentUser.uid).get()
          .then(snap => {
            if (!snap.empty) {
              orders = snap.docs
                .map(d => ({id:d.id,...d.data()}))
                .sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
            }
            setActiveTab('orders');
          })
          .catch(() => setActiveTab('orders'));

      } else if (type === 'trade_offer') {
        // Seller received a trade offer → activate the tab FIRST, then render
        // so setActiveTab's offersUnsubscribe() fires before the listener is set up
        setActiveTab('product-detail');
        if (pid) {
          const p = products.find(x => x.id === pid);
          if (p) { renderProductDetailPage(p); }
          else setActiveTab('my-listings');
        } else { setActiveTab('my-listings'); }

      } else if (type === 'price_offer') {
        // Seller received a price offer → activate tab first, then render
        setActiveTab('product-detail');
        if (pid) {
          const p = products.find(x => x.id === pid);
          if (p) { renderProductDetailPage(p); }
          else setActiveTab('my-listings');
        } else { setActiveTab('my-listings'); }

      } else if (pid) {
        // Generic — open product detail if we have a product id
        const p = products.find(x => x.id === pid);
        if (p) { renderProductDetailPage(p); setActiveTab('product-detail'); }
        else setActiveTab('buy');

      } else {
        setActiveTab('orders'); // safe fallback
      }
    });
  });
};

const openNotifDropdown = () => {
  const dd = document.getElementById('notif-dropdown');
  if (!dd) return;
  dd.classList.add('open');
};
const closeNotifDropdown = () => {
  document.getElementById('notif-dropdown')?.classList.remove('open');
};

// Bell button toggle
document.body.addEventListener('click', e => {
  const bell = e.target.closest('#notif-bell-btn');
  if (bell) { e.stopPropagation(); document.getElementById('notif-dropdown')?.classList.contains('open') ? closeNotifDropdown() : openNotifDropdown(); return; }
  // Mark all read button
  if (e.target.id === 'mark-all-read-btn') {
    e.stopPropagation();
    // Update DOM immediately (optimistic)
    document.querySelectorAll('.notif-item.unread').forEach(el => {
      el.classList.remove('unread');
      el.querySelector('.notif-dot')?.remove();
    });
    updateNotifBadge(0);
    // Then write to Firestore
    db.collection('notifications').where('uid','==',currentUser?.uid).where('read','==',false).get()
      .then(snap => {
        if (snap.empty) return;
        const batch = db.batch();
        snap.docs.forEach(d => batch.update(d.ref, {read: true}));
        return batch.commit();
      }).catch(() => {});
    return;
  }
  // Close dropdown when clicking outside
  if (!e.target.closest('#notif-dropdown') && !e.target.closest('#notif-bell-btn')) {
    closeNotifDropdown();
  }
});

const applyLazyLoad = () => {
  document.querySelectorAll('img:not([loading])').forEach(img => {
    img.loading = 'lazy';
    img.decoding = 'async';
    // Graceful fade-in on load
    img.style.transition = 'opacity 0.3s ease';
    img.style.opacity = img.complete ? '1' : '0';
    if (!img.complete) img.addEventListener('load', () => { img.style.opacity = '1'; }, { once: true });
  });
};

applyLazyLoad();
const _imgObserver = new MutationObserver(() => applyLazyLoad());
_imgObserver.observe(document.body, { childList: true, subtree: true });

// ══════════════════════════════════════════════
// OPTIMISATION: Smooth momentum scrolling in all panels
// ══════════════════════════════════════════════
document.querySelectorAll('.overflow-y-auto, .overflow-x-auto').forEach(el => {
  el.style.webkitOverflowScrolling = 'touch';
});

// ══════════════════════════════════════════════
// MOBILE: Swipe-down to close bottom-sheet modals
// ══════════════════════════════════════════════
if (window.matchMedia('(max-width: 640px)').matches) {
  const MODALS = [authModal, checkoutModal, profilePicModal, lostAndFoundModal,
                  tradeOfferModal, changePasswordModal, termsModal, privacyModal].filter(Boolean);

  MODALS.forEach(modal => {
    const content = modal.querySelector('.modal-content');
    if (!content) return;

    // Add drag handle indicator
    if (!content.querySelector('.drag-handle')) {
      const handle = document.createElement('div');
      handle.className = 'drag-handle';
      handle.style.cssText = 'width:36px;height:4px;background:rgba(139,92,246,0.25);border-radius:99px;margin:0 auto 12px;flex-shrink:0;';
      content.prepend(handle);
    }

    let startY = 0, currentY = 0, isDragging = false;

    content.addEventListener('touchstart', e => {
      // Only start drag if at top of scroll
      if (content.scrollTop > 2) return;
      startY = e.touches[0].clientY;
      isDragging = true;
      content.style.transition = 'none';
    }, { passive: true });

    content.addEventListener('touchmove', e => {
      if (!isDragging) return;
      currentY = e.touches[0].clientY - startY;
      if (currentY < 0) { currentY = 0; return; }
      content.style.transform = `translateY(${currentY}px)`;
    }, { passive: true });

    content.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      content.style.transition = '';
      if (currentY > 130) {
        // Dismiss
        content.style.transform = 'translateY(100%)';
        setTimeout(() => {
          modal.classList.remove('show');
          content.style.transform = '';
        }, 300);
      } else {
        content.style.transform = '';
      }
      currentY = 0;
    });
  });
}

});
</script>
</body>
</html>
