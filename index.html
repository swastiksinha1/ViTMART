<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ViTMART - The Ultimate Student Marketplace</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap&font-display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap&font-display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        'jakarta': ['Outfit', 'sans-serif'],
        'syne': ['Outfit', 'sans-serif'],
        'display': ['Playfair Display', 'serif'],
        'body': ['Outfit', 'sans-serif'],
      },
      colors: {
        'vit': {
          '50': '#f5f3ff', '100': '#ede9fe', '200': '#ddd6fe', '300': '#c4b5fd',
          '400': '#a78bfa', '500': '#8b5cf6', '600': '#7c3aed', '700': '#6d28d9',
          '800': '#5b21b6', '900': '#4c1d95', '950': '#2e1065'
        },
        'cyan': {
          '400': '#22d3ee', '500': '#06b6d4', '600': '#0891b2'
        },
        'rose': {
          '400': '#fb7185', '500': '#f43f5e', '600': '#e11d48'
        }
      },
      animation: {
        'float': 'float 6s ease-in-out infinite',
        'float-slow': 'float 9s ease-in-out infinite',
        'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
        'shimmer': 'shimmer 2.5s linear infinite',
        'gradient-shift': 'gradient-shift 8s ease infinite',
        'spin-slow': 'spin 12s linear infinite',
      },
      keyframes: {
        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-18px)' } },
        'pulse-glow': { '0%, 100%': { boxShadow: '0 0 20px rgba(139,92,246,0.4)' }, '50%': { boxShadow: '0 0 50px rgba(139,92,246,0.8), 0 0 80px rgba(6,182,212,0.3)' } },
        shimmer: { '0%': { backgroundPosition: '-200% center' }, '100%': { backgroundPosition: '200% center' } },
        'gradient-shift': { '0%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' }, '100%': { backgroundPosition: '0% 50%' } },
      }
    }
  }
}
</script>
<style>
  /* ═══════════════════════════════════════════
     VITMART — PREMIUM DESIGN SYSTEM
  ═══════════════════════════════════════════ */
  :root {
    --vit-primary: #7c3aed;
    --vit-secondary: #06b6d4;
    --vit-accent: #f43f5e;
    --vit-dark: #080614;
    --vit-card-light: rgba(255,255,255,0.72);
    --vit-card-dark: rgba(255,255,255,0.035);
    --vit-border-light: rgba(139,92,246,0.18);
    --vit-border-dark: rgba(139,92,246,0.12);
    --font-body: "Outfit", system-ui, sans-serif;
    --font-display: "Playfair Display", Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; overscroll-behavior-y: none; }
  body {
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #f8f7ff;
    color: #1a1430;
    line-height: 1.7;
    transition: background 0.35s, color 0.35s;
    overflow-x: hidden;
  }
  .dark body { background: var(--vit-dark); color: #e2ddf5; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#7c3aed,#06b6d4); border-radius: 10px; }
  * { scrollbar-width: thin; scrollbar-color: #7c3aed transparent; }
  ::selection { background: rgba(139,92,246,0.25); color: inherit; }

  /* ═══════════════════════════════════════════
     PERFORMANCE & SMOOTHNESS ENHANCEMENTSs
  ═══════════════════════════════════════════ */

  /* GPU-accelerate the elements that animate most */
  .product-card, .category-card, .hiw-card, .rec-card,
  .hero-product-card, .faq-item, .feature-pill,
  #cart-drawer, .modal-content, #notif-dropdown,
  #popup-chat-container {
    will-change: transform;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .orb { animation: none !important; }
    .grad-text { animation: none !important; }
  }

  /* iOS momentum scrolling for all scroll containers */
  .overflow-y-auto, .overflow-x-auto,
  #notif-list, #cmd-results, #quick-chips-bar,
  .replies-container { -webkit-overflow-scrolling: touch; }

  /* Prevent text selection flash on tap */
  button, [role="button"], .nav-item, .mob-nav-item,
  .product-card, .category-card {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ═══════════════════════════════════════════
     MOBILE — CORE LAYOUT
  ═══════════════════════════════════════════ */

  /* Ensure content doesn't go under iOS home indicator */
  #mobile-bottom-nav {
    padding-bottom: env(safe-area-inset-bottom, 0px);
    height: calc(64px + env(safe-area-inset-bottom, 0px));
  }

  @media (max-width: 640px) {
    /* Give main content space above AND below mobile nav */
    main { padding-bottom: calc(74px + env(safe-area-inset-bottom, 0px)) !important; }

    /* ── Header ── */
    #app-header { padding: 10px 14px; }
    #app-header .container { gap: 8px; }

    /* ── Minimum touch targets (Apple HIG = 44px) ── */
    .mob-nav-item { min-height: 44px; }
    button, a, [role="button"] { min-height: 36px; }

    /* ── Back-to-top above mobile nav ── */
    #back-to-top { bottom: calc(76px + env(safe-area-inset-bottom, 0px)); right: 1rem; width: 42px; height: 42px; }

    /* ── Notification dropdown — full-width on mobile ── */
    #notif-dropdown {
      top: 62px;
      right: 8px;
      left: 8px;
      width: auto;
      max-height: 70vh;
      border-radius: 16px;
    }

    /* ── Chat widget — full-width & taller on mobile ── */
    #popup-chat-container {
      bottom: calc(5.5rem + env(safe-area-inset-bottom, 0px));
      right: 10px;
      left: 10px;
      width: auto;
      max-width: none;
      height: 65vh;
      max-height: 480px;
    }
    #popup-chat-widget {
      bottom: calc(5rem + env(safe-area-inset-bottom, 0px));
      right: 1rem;
    }

    /* ── Product cards — touch-friendly quick view ── */
    .quick-view-strip { transform: translateY(0) !important; }

    /* ── Hero product card images — shorter on mobile ── */
    .hero-product-card img { height: 160px; }

    /* ── Modals — full bottom-sheet style on mobile ── */
    .modal { align-items: flex-end !important; padding: 0 !important; }
    .modal-content {
      border-bottom-left-radius: 0 !important;
      border-bottom-right-radius: 0 !important;
      border-top-left-radius: 24px !important;
      border-top-right-radius: 24px !important;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)) !important;
      transform: translateY(100%) scale(1) !important;
    }
    .modal.show .modal-content {
      transform: translateY(0) scale(1) !important;
    }
    /* Keep confirm modal centered */
    #confirm-modal { align-items: center !important; padding: 1rem !important; }
    #confirm-modal .modal-content {
      border-radius: 20px !important;
      max-height: none;
      transform: translateY(28px) scale(0.94) !important;
    }
    #confirm-modal.show .modal-content { transform: translateY(0) scale(1) !important; }

    /* ── Cart drawer — full width on mobile ── */
    #cart-drawer { max-width: 100%; }

    /* ── Command palette — full width ── */
    #cmd-box { border-radius: 20px 20px 0 0; }
    #command-palette { align-items: flex-end !important; padding: 0 !important; }

    /* ── Typography scaling ── */
    .loader-text { font-size: 1.5rem; }

    /* ── Vit inputs — larger hit area ── */
    .vit-input { padding: 0.9rem 1rem; font-size: 16px; /* prevent iOS zoom */ }

    /* ── Section eyebrow — slightly smaller ── */
    .section-eyebrow { font-size: 10px; }

    /* ── Feature pills — wrap better ── */
    .feature-pill { font-size: 0.75rem; padding: 8px 14px; }

    /* ── Category pills ── */
    .cat-pill { padding: 7px 14px; font-size: 0.78rem; }

    /* ── FAQ — no side shift on mobile ── */
    .faq-item:hover, .faq-item[open] { transform: none; }

    /* ── Product cards — less extreme hover lift on mobile ── */
    .product-card:hover { transform: translateY(-4px) scale(1.008); }
    .hiw-card:hover { transform: translateY(-6px) scale(1.01); }

    /* ── Price offer items wrap ── */
    .price-offer-item { flex-wrap: wrap; }

    /* ── Notice card ── */
    .notice-card { border-radius: 16px; }

    /* ── Manage rows ── */
    .delete-item-row { flex-wrap: wrap; }

    /* ── Ticker always visible ── */
    .ticker-content { animation-duration: 18s !important; }
  }

  /* ═══════════════════════════════════════════
     TABLET (641px – 1023px)
  ═══════════════════════════════════════════ */
  @media (min-width: 641px) and (max-width: 1023px) {
    /* Slightly smaller hover lifts to feel snappier */
    .product-card:hover { transform: translateY(-6px) scale(1.01); }
    .hiw-card:hover { transform: translateY(-8px) scale(1.015); }

    /* Notif dropdown slightly wider on tablet */
    #notif-dropdown { width: 360px; }
  }

  /* ═══════════════════════════════════════════
     SMOOTH SCROLL SNAP for horizontal lists
  ═══════════════════════════════════════════ */
  .snap-x-scroll {
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .snap-x-scroll > * { scroll-snap-align: start; }

  /* ═══════════════════════════════════════════
     OVERSCROLL LOCK (prevent bounce on modals)
  ═══════════════════════════════════════════ */
  body.modal-open { overflow: hidden; overscroll-behavior: none; }

  /* ═══════════════════════════════════════════
     FOCUS VISIBLE (keyboard a11y, not on touch)
  ═══════════════════════════════════════════ */
  :focus-visible {
    outline: 2px solid rgba(124,58,237,0.6);
    outline-offset: 3px;
    border-radius: 6px;
  }
  :focus:not(:focus-visible) { outline: none; }

  /* === TYPOGRAPHY === */
  h1,h2,h3,h4,h5,h6 { font-family: var(--font-body); font-weight: 800; letter-spacing: -0.025em; line-height: 1.15; }
  .display-heading { font-family: var(--font-display); font-weight: 800; font-style: italic; }
  .section-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: #7c3aed;
  }
  .section-eyebrow::before {
    content: ""; width: 20px; height: 2px;
    background: linear-gradient(90deg,#7c3aed,#06b6d4); border-radius: 2px; display: inline-block;
  }
  .dark .section-eyebrow { color: #a78bfa; }

  /* === GLASS === */
  .glass {
    background: var(--vit-card-light);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--vit-border-light);
  }
  .dark .glass { background: var(--vit-card-dark); border-color: var(--vit-border-dark); }
  .glass-strong {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(139,92,246,0.2);
  }
  .dark .glass-strong { background: rgba(12,8,28,0.88); border-color: rgba(139,92,246,0.18); }

  /* === GRADIENT TEXT === */
  .grad-text {
    background: linear-gradient(135deg,#7c3aed 0%,#06b6d4 50%,#f43f5e 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 200% auto; animation: shimmer 5s linear infinite;
  }
  .grad-text-vp {
    background: linear-gradient(135deg,#8b5cf6 0%,#22d3ee 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* === HERO BG === */
  .hero-bg {
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(139,92,246,0.45) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.2) 0%, transparent 50%),
                linear-gradient(180deg, #080614 0%, #0d0922 50%, #060412 100%);
  }
  .grid-overlay {
    background-image: linear-gradient(rgba(139,92,246,0.06) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(139,92,246,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .dot-grid {
    background-image: radial-gradient(circle, rgba(139,92,246,0.2) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  /* === ORBS === */
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.22; animation: float 9s ease-in-out infinite; pointer-events: none; }
  .orb-purple { background: radial-gradient(circle,#7c3aed,#4c1d95); }
  .orb-cyan { background: radial-gradient(circle,#06b6d4,#0e7490); animation-delay:-4s; }
  .orb-rose { background: radial-gradient(circle,#f43f5e,#9f1239); animation-delay:-7s; }
  .noise::after {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* === BUTTONS === */
  .shimmer-btn {
    position: relative; overflow: hidden; transition: all 0.3s;
  }
  .shimmer-btn::after {
    content:""; position:absolute; top:-50%; left:-75%; width:50%; height:200%;
    background:linear-gradient(to right,transparent,rgba(255,255,255,0.22),transparent);
    transform:skewX(-20deg); transition:left 0.5s ease;
  }
  .shimmer-btn:hover::after { left:125%; }
  .shimmer-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(139,92,246,0.5); }
  .glow-btn {
    position: relative; transition: all 0.3s ease; overflow: hidden;
  }
  .glow-btn::before {
    content:""; position:absolute; inset:-2px;
    background: linear-gradient(135deg,#7c3aed,#06b6d4,#f43f5e,#7c3aed);
    background-size: 300% 300%; border-radius: inherit; z-index:-1;
    animation: gradient-shift 4s ease infinite; opacity:0; transition:opacity 0.3s;
  }
  .glow-btn:hover::before { opacity:1; }
  .glow-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(139,92,246,0.4); }

  /* === TABS === */
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* === NAV === */
  .nav-item {
    position:relative; transition:color 0.25s, transform 0.2s; padding-bottom:4px;
    font-weight: 600; font-size: 0.8rem; letter-spacing: 0.025em;
  }
  .nav-item::after {
    content:""; position:absolute; width:100%; transform:scaleX(0); height:2px;
    bottom:0; left:0; background:linear-gradient(90deg,#7c3aed,#06b6d4);
    transform-origin:right; transition:transform 0.3s ease; border-radius:2px;
  }
  .nav-item:hover { color:#7c3aed; transform:translateY(-2px); }
  .dark .nav-item:hover { color:#a78bfa; }
  .nav-item:hover::after { transform:scaleX(1); transform-origin:left; }
  .nav-item.active { color:#7c3aed; font-weight:700; }
  .dark .nav-item.active { color:#a78bfa; }
  .nav-item.active::after { transform:scaleX(1); transform-origin:left; }

  /* === MODAL === */
  .modal { transition:opacity 0.3s ease,visibility 0.3s ease; opacity:0; visibility:hidden; }
  .modal.show { opacity:1; visibility:visible; }
  .modal-content { transition:transform 0.38s cubic-bezier(0.34,1.2,0.64,1); transform:translateY(28px) scale(0.94); }
  .modal.show .modal-content { transform:translateY(0) scale(1); }

  /* === PRODUCT CARD === */
  .product-card {
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.35s ease; position:relative;
  }
  .product-card::before {
    content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
    background:linear-gradient(135deg,rgba(139,92,246,0),rgba(139,92,246,0));
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    transition:background 0.35s; pointer-events:none; z-index:1;
  }
  .product-card:hover { transform:translateY(-10px) scale(1.015); box-shadow:0 25px 70px rgba(139,92,246,0.2), 0 0 0 1px rgba(139,92,246,0.15); }
  .product-card:hover::before { background:linear-gradient(135deg,rgba(139,92,246,0.5),rgba(6,182,212,0.35)); }

  /* === CATEGORY CARD === */
  .category-card {
    transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1); cursor:pointer; position:relative; overflow:hidden;
  }
  .category-card::before {
    content:""; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(6,182,212,0.04)); opacity:0; transition:opacity 0.3s;
  }
  .category-card:hover { transform:translateY(-7px) scale(1.045); box-shadow:0 15px 45px rgba(139,92,246,0.2); }
  .category-card:hover::before { opacity:1; }
  .category-card .cat-icon { transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); display:inline-block; }
  .category-card:hover .cat-icon { transform:scale(1.35) rotate(-10deg); }

  /* === FAQ === */
  .faq-item {
    position:relative; overflow:hidden; border-radius:20px;
    border: 1px solid rgba(139,92,246,0.14);
    background: rgba(255,255,255,0.68);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    transition: all 0.35s cubic-bezier(0.34,1.1,0.64,1);
  }
  .dark .faq-item { background:rgba(255,255,255,0.03); border-color:rgba(139,92,246,0.1); }
  .faq-item::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(180deg,#7c3aed,#06b6d4); border-radius:0 2px 2px 0;
    opacity:0; transition:opacity 0.3s;
  }
  .faq-item:hover { transform:translateX(5px); box-shadow:0 8px 40px rgba(139,92,246,0.12); }
  .faq-item[open] { transform:translateX(5px); box-shadow:0 12px 50px rgba(139,92,246,0.15); }
  .faq-item:hover::before, .faq-item[open]::before { opacity:1; }
  .faq-item summary { list-style:none; cursor:pointer; user-select:none; }
  .faq-item summary::-webkit-details-marker { display:none; }
  .faq-arrow { transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0; }
  .faq-item[open] .faq-arrow { transform:rotate(180deg); }
  .faq-body { animation:faq-open 0.38s cubic-bezier(0.34,1.1,0.64,1) forwards; }
  @keyframes faq-open { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

  /* === HIW CARDS === */
  .hiw-card {
    position:relative; overflow:hidden;
    transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1);
  }
  .hiw-card::after {
    content:""; position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08), transparent 70%);
    opacity:0; transition:opacity 0.4s;
  }
  .hiw-card:hover { transform:translateY(-14px) scale(1.025); box-shadow:0 28px 65px rgba(139,92,246,0.2); }
  .hiw-card:hover::after { opacity:1; }
  .hiw-icon { transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1); display:inline-block; }
  .hiw-card:hover .hiw-icon { transform:scale(1.4) rotate(-8deg); }

  /* === SECTION STYLES === */
  .section-card {
    position:relative; overflow:hidden; border-radius:28px;
    transition:transform 0.35s ease, box-shadow 0.35s ease;
  }
  .underline-gradient {
    position:relative; display:inline-block;
  }
  .underline-gradient::after {
    content:""; position:absolute; left:0; bottom:-6px; width:100%; height:3px;
    background:linear-gradient(90deg,#7c3aed,#06b6d4,#f43f5e);
    border-radius:3px; transform:scaleX(0); transform-origin:left;
    transition:transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }
  .is-visible .underline-gradient::after { transform:scaleX(1); }
  .feature-pill {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px; border-radius:999px;
    background:rgba(255,255,255,0.6); backdrop-filter:blur(12px);
    border:1px solid rgba(139,92,246,0.16);
    font-weight:600; font-size:0.82rem;
    transition:all 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .dark .feature-pill { background:rgba(255,255,255,0.05); }
  .feature-pill:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(139,92,246,0.2); border-color:rgba(139,92,246,0.35); }

  /* === INPUTS === */
  .vit-input {
    width:100%; padding:0.8rem 1rem;
    border:1px solid rgba(139,92,246,0.18); border-radius:14px;
    background:rgba(255,255,255,0.65); backdrop-filter:blur(10px);
    font-family:var(--font-body); font-size:0.9rem; font-weight:500;
    color:#1a1430; transition:all 0.25s; -webkit-appearance:none;
  }
  .dark .vit-input { background:rgba(255,255,255,0.05); border-color:rgba(139,92,246,0.18); color:#e2ddf5; }
  .vit-input:focus { outline:none; border-color:#7c3aed; box-shadow:0 0 0 3px rgba(139,92,246,0.14); background:rgba(255,255,255,0.92); }
  .dark .vit-input:focus { background:rgba(255,255,255,0.08); }
  .vit-input::placeholder { color:#9ca3af; font-weight:400; }
  .input-error { border-color:#f43f5e!important; box-shadow:0 0 0 3px rgba(244,63,94,0.12)!important; }
  .error-message { color:#f43f5e; font-size:0.78rem; margin-top:0.35rem; font-weight:500; }

  /* === BADGES === */
  .badge-sold { position:absolute; top:10px; right:10px; background:linear-gradient(135deg,#f43f5e,#be123c); color:white; font-size:0.65rem; font-weight:800; padding:3px 9px; border-radius:999px; z-index:10; letter-spacing:0.08em; text-transform:uppercase; }
  .badge-traded { position:absolute; top:10px; right:10px; background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:white; font-size:0.65rem; font-weight:800; padding:3px 9px; border-radius:999px; z-index:10; letter-spacing:0.08em; text-transform:uppercase; }
  .badge-tradeable { position:absolute; top:10px; left:10px; background:linear-gradient(135deg,#10b981,#059669); color:white; font-size:0.65rem; font-weight:800; padding:3px 9px; border-radius:999px; z-index:10; letter-spacing:0.08em; }

  /* === DROP ZONES === */
  .drop-zone { border:2px dashed rgba(139,92,246,0.28); transition:all 0.25s; }
  .drop-zone.drag-over { background:rgba(139,92,246,0.07); border-color:#7c3aed; box-shadow:inset 0 0 24px rgba(139,92,246,0.1); }

  /* === CART === */
  #cart-drawer { transform:translateX(100%); transition:transform 0.38s cubic-bezier(0.34,1.1,0.64,1); }
  #cart-drawer.open { transform:translateX(0); }

  /* === PAGE LOADER === */
  #page-loader {
    position:fixed; inset:0; background:var(--vit-dark); z-index:10000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
    transition:opacity 0.8s ease, visibility 0.8s ease;
  }
  #page-loader.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  .loader-rings { position:relative; width:80px; height:80px; }
  .loader-ring { position:absolute; inset:0; border-radius:50%; border:2.5px solid transparent; animation:loader-spin 1.2s linear infinite; }
  .loader-ring:nth-child(1) { border-top-color:#7c3aed; }
  .loader-ring:nth-child(2) { inset:10px; border-right-color:#06b6d4; animation-duration:0.9s; animation-direction:reverse; }
  .loader-ring:nth-child(3) { inset:22px; border-bottom-color:#f43f5e; animation-duration:0.65s; }
  @keyframes loader-spin { to{transform:rotate(360deg)} }
  .loader-text {
    font-family:var(--font-body); font-weight:900; font-size:2rem; letter-spacing:0.15em; text-transform:uppercase;
    background:linear-gradient(135deg,#a78bfa,#22d3ee,#fb7185);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .loader-sub { font-size:0.7rem; color:rgba(167,139,250,0.45); letter-spacing:0.35em; text-transform:uppercase; font-weight:600; }

  /* === WELCOME OVERLAY === */
  #welcome-overlay {
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(124,58,237,0.4) 0%, transparent 65%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.2) 0%, transparent 50%),
                #080614;
  }
  .welcome-icon { animation:icon-pop 1.3s cubic-bezier(0.34,1.56,0.64,1) forwards; display:block; }
  .welcome-line1 { animation:line-up 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards; opacity:0; transform:translateY(40px); }
  .welcome-line2 { animation:line-up 0.9s cubic-bezier(0.22,1,0.36,1) 0.6s forwards; opacity:0; transform:translateY(40px); }
  .welcome-sub { animation:line-up 0.8s ease-out 0.9s forwards; opacity:0; transform:translateY(20px); }
  .welcome-bar { animation:bar-grow 1.6s cubic-bezier(0.22,1,0.36,1) 0.45s forwards; transform-origin:center; transform:scaleX(0); display:block; }
  @keyframes icon-pop { 0%{transform:scale(0.3) rotate(-20deg);opacity:0} 60%{transform:scale(1.15) rotate(6deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
  @keyframes line-up { to{opacity:1;transform:translateY(0)} }
  @keyframes bar-grow { to{transform:scaleX(1)} }

  /* === CONFETTI === */
  .confetti { position:fixed; width:8px; height:8px; background:var(--color); opacity:1; z-index:1000; pointer-events:none; border-radius:2px; animation:confetti-fly 2.2s ease-out forwards; }
  @keyframes confetti-fly { 0%{transform:translate(0,0) rotate(0deg);opacity:1} 100%{transform:translate(var(--x),var(--y)) rotate(720deg);opacity:0} }

  /* === FADE IN === */
  .fade-in-section { opacity:0; transform:translateY(28px); transition:opacity 0.75s ease, transform 0.75s ease; }
  .fade-in-section.is-visible { opacity:1; transform:translateY(0); }

  /* === SKELETON === */
  .skeleton-card { background:rgba(255,255,255,0.7); border-radius:1rem; overflow:hidden; }
  .dark .skeleton-card { background:rgba(255,255,255,0.04); }
  .skeleton-img, .skeleton-text { background:linear-gradient(90deg,#ede9fe 25%,#f5f3ff 50%,#ede9fe 75%); background-size:200% 100%; animation:skel-shimmer 1.6s infinite; }
  .dark .skeleton-img, .dark .skeleton-text { background:linear-gradient(90deg,#1a1030 25%,#231545 50%,#1a1030 75%); background-size:200% 100%; }
  .skeleton-img { height:12rem; }
  .skeleton-text { height:0.85rem; border-radius:6px; }
  @keyframes skel-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Custom cursor only on pointer (non-touch) devices */
  @media (hover: hover) and (pointer: fine) {
    body { cursor: none; }
  }
  #cursor-inner, #cursor-outer {
    position:fixed; pointer-events:none; z-index:99999;
    border-radius:50%; transform:translate(-50%,-50%); transition:opacity 0.3s;
    will-change:left, top;
  }
  #cursor-inner {
    width:8px; height:8px; background:#ffffff;
    box-shadow:0 0 15px rgba(139,92,246,1), 0 0 40px rgba(139,92,246,0.5);
    mix-blend-mode: difference;
    transition:width 0.15s, height 0.15s, box-shadow 0.15s;
  }
  #cursor-outer {
    width:40px; height:40px;
    border:1.5px solid rgba(139,92,246,0.55);
    transition:width 0.32s cubic-bezier(0.34,1.56,0.64,1), height 0.32s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, background 0.3s;
  }
  #cursor-outer.hovering { width:62px; height:62px; border-color:rgba(139,92,246,0.9); background:rgba(139,92,246,0.08); }
  #cursor-inner.clicking { width:14px; height:14px; box-shadow:0 0 25px rgba(34,211,238,1), 0 0 55px rgba(34,211,238,0.4); background:#22d3ee; }
  @media (hover:none) { #cursor-inner, #cursor-outer { display:none; } }

  /* === SCROLL PROGRESS === */
  #scroll-progress { position:fixed; top:0; left:0; height:2.5px; width:0%; background:linear-gradient(90deg,#7c3aed 0%,#06b6d4 50%,#f43f5e 100%); z-index:9998; transition:width 0.07s linear; box-shadow:0 0 14px rgba(139,92,246,0.8); }

  /* === BACK TO TOP === */
  #back-to-top { position:fixed; bottom:7.5rem; right:2rem; z-index:44; width:46px; height:46px; background:linear-gradient(135deg,#7c3aed,#06b6d4); border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; box-shadow:0 4px 22px rgba(139,92,246,0.5); cursor:pointer; transition:all 0.38s cubic-bezier(0.34,1.56,0.64,1); transform:translateY(20px) scale(0.8); opacity:0; pointer-events:none; }
  #back-to-top.visible { transform:translateY(0) scale(1); opacity:1; pointer-events:auto; }
  #back-to-top:hover { transform:translateY(-5px) scale(1.12); box-shadow:0 12px 35px rgba(139,92,246,0.65); }

  /* === MOBILE NAV === */
  #mobile-bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:35; display:none; background:rgba(255,255,255,0.94); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px); border-top:1px solid rgba(139,92,246,0.1); box-shadow:0 -8px 30px rgba(139,92,246,0.1); padding-bottom:env(safe-area-inset-bottom, 0px); }
  .dark #mobile-bottom-nav { background:rgba(8,6,20,0.94); border-top-color:rgba(139,92,246,0.12); }
  @media (max-width:640px) { #mobile-bottom-nav { display:flex; } main { padding-bottom:calc(74px + env(safe-area-inset-bottom, 0px)); } }
  .mob-nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:10px 4px 12px; font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#9ca3af; cursor:pointer; transition:all 0.2s; position:relative; min-height:52px; }
  .mob-nav-item.active { color:#7c3aed; }
  .dark .mob-nav-item.active { color:#a78bfa; }
  .mob-nav-item.active::before { content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2.5px; background:linear-gradient(90deg,#7c3aed,#06b6d4); border-radius:0 0 4px 4px; }
  .mob-nav-item svg { width:22px; height:22px; transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .mob-nav-item.active svg { transform:scale(1.2); }
  .mob-nav-item:active svg { transform:scale(0.88); }

  /* === COMMAND PALETTE === */
  #command-palette { transition:opacity 0.2s,visibility 0.2s; opacity:0; visibility:hidden; }
  #command-palette.show { opacity:1; visibility:visible; }
  #cmd-box { transition:transform 0.32s cubic-bezier(0.34,1.2,0.64,1),opacity 0.22s; transform:translateY(-22px) scale(0.95); opacity:0; }
  #command-palette.show #cmd-box { transform:translateY(0) scale(1); opacity:1; }
  .cmd-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; cursor:pointer; transition:background 0.15s,transform 0.15s; font-size:0.875rem; }
  .cmd-item:hover, .cmd-item.selected { background:rgba(139,92,246,0.1); transform:translateX(4px); }
  .cmd-item-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }

  /* === WISHLIST === */
  #wishlist-count { display:none; }
  #wishlist-count.show { display:flex; }
  .wishlist-btn { position:absolute; top:9px; right:9px; z-index:20; width:32px; height:32px; background:rgba(255,255,255,0.92); backdrop-filter:blur(10px); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 2px 12px rgba(0,0,0,0.14); pointer-events:auto!important; }
  .dark .wishlist-btn { background:rgba(15,10,30,0.88); }
  .wishlist-btn:hover { transform:scale(1.22); }
  .wishlist-btn.wishlisted { background:#f43f5e; }
  .wishlist-btn svg { width:15px; height:15px; transition:all 0.25s; stroke:#9ca3af; fill:transparent; }
  .wishlist-btn.wishlisted svg { stroke:white; fill:white; transform:scale(1.12); }
  .wishlist-btn:active { transform:scale(0.88); }

  /* === 3D TILT === */
  .tilt-card { transform-style:preserve-3d; will-change:transform; }
  .tilt-shine { position:absolute; inset:0; border-radius:inherit; background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.16) 0%, transparent 65%); pointer-events:none; z-index:10; opacity:0; transition:opacity 0.3s; }
  .tilt-card:hover .tilt-shine { opacity:1; }

  /* === QUICK VIEW === */
  .quick-view-strip { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, rgba(8,6,20,0.96) 0%, rgba(8,6,20,0.55) 60%, transparent 100%); transform:translateY(100%); transition:transform 0.38s cubic-bezier(0.34,1.1,0.64,1); pointer-events:none; z-index:12; padding:16px 14px 12px; }
  .product-card:hover .quick-view-strip { transform:translateY(0); pointer-events:auto; }

  /* === LIGHTBOX === */
  #lightbox { position:fixed; inset:0; z-index:9990; transition:opacity 0.3s,visibility 0.3s; opacity:0; visibility:hidden; background:rgba(5,3,15,0.95); backdrop-filter:blur(18px); display:flex; align-items:center; justify-content:center; }
  #lightbox.show { opacity:1; visibility:visible; }
  #lightbox img { max-width:90vw; max-height:85vh; border-radius:18px; object-fit:contain; box-shadow:0 30px 100px rgba(139,92,246,0.35); }

  /* === TICKER === */
  .ticker-content { display:inline-flex; white-space:nowrap; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* === ANIMATIONS === */
  @keyframes subtle-pop { 0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.05);opacity:1} 100%{transform:scale(1);opacity:1} }
  .animate-subtle-pop { animation:subtle-pop 0.4s ease-out forwards; opacity:0; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .animate-tab-content { animation:tab-reveal 0.5s cubic-bezier(0.34,1.1,0.64,1) forwards; }
  @keyframes tab-reveal { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes tab-fade-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .pfp-pop { animation:pfp-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes pfp-pop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

  /* === KBD === */
  .kbd-hint { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; background:rgba(139,92,246,0.09); border:1px solid rgba(139,92,246,0.18); border-radius:7px; font-size:11px; font-weight:700; color:#7c3aed; font-family:var(--font-body); white-space:nowrap; }
  .dark .kbd-hint { color:#a78bfa; background:rgba(139,92,246,0.14); border-color:rgba(139,92,246,0.22); }

  /* === WAVE === */
  .wave-top { overflow:hidden; line-height:0; }
  .wave-top svg { display:block; width:100%; }

  /* === CHAT === */
  #popup-chat-widget { position:fixed; bottom:2rem; right:2rem; z-index:45; bottom: calc(2rem + env(safe-area-inset-bottom, 0px)); }
  #popup-chat-container { position:fixed; bottom:6rem; right:2rem; width:90%; max-width:400px; height:70vh; max-height:520px; z-index:45; transition:transform 0.38s cubic-bezier(0.34,1.1,0.64,1), opacity 0.3s; transform:translateY(22px) scale(0.92); opacity:0; pointer-events:none; bottom: calc(6rem + env(safe-area-inset-bottom, 0px)); }
  #popup-chat-container.open { transform:translateY(0) scale(1); opacity:1; pointer-events:auto; }

  /* === CHAT TEXT FIX === */
  .bot-bubble { background:rgba(241,240,255,0.95); color:#1a1430 !important; border:1px solid rgba(139,92,246,0.12); }
  .dark .bot-bubble { background:rgba(30,20,60,0.9); color:#e2ddf5 !important; border:1px solid rgba(139,92,246,0.2); }
  .bot-bubble strong { color:#7c3aed !important; }
  .dark .bot-bubble strong { color:#a78bfa !important; }

  /* === STAR RATING === */
  .star-btn { font-size:1.5rem; cursor:pointer; transition:transform 0.2s, filter 0.2s; color:#d1d5db; }
  .star-btn:hover, .star-btn.active { color:#f59e0b; transform:scale(1.2); filter:drop-shadow(0 0 6px rgba(245,158,11,0.5)); }
  .star-display { color:#f59e0b; }
  .star-display.empty { color:#d1d5db; }

  /* === REVIEW CARD === */
  .review-card { background:rgba(255,255,255,0.8); border:1px solid rgba(139,92,246,0.12); border-radius:20px; padding:1.25rem; transition:all 0.3s; }
  .dark .review-card { background:rgba(255,255,255,0.04); border-color:rgba(139,92,246,0.15); }
  .review-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(139,92,246,0.12); }

  /* === RECOMMENDATION CARD === */
  .rec-card { position:relative; cursor:pointer; transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1); background:rgba(255,255,255,0.85); border:1px solid rgba(139,92,246,0.12); border-radius:20px; overflow:hidden; }
  .dark .rec-card { background:rgba(255,255,255,0.04); border-color:rgba(139,92,246,0.15); }
  .rec-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 20px 55px rgba(139,92,246,0.2); border-color:rgba(139,92,246,0.35); }
  .rec-badge { position:absolute; top:10px; left:10px; background:linear-gradient(135deg,#7c3aed,#06b6d4); color:white; font-size:10px; font-weight:800; letter-spacing:0.08em; padding:3px 10px; border-radius:99px; z-index:2; }

  /* === MANAGE TAB === */
  .manage-section { background:rgba(255,255,255,0.7); border:1px solid rgba(139,92,246,0.12); border-radius:20px; padding:1.5rem; backdrop-filter:blur(12px); }
  .dark .manage-section { background:rgba(255,255,255,0.04); }
  .danger-zone { border-color:rgba(244,63,94,0.25) !important; }
  .delete-item-row { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; background:rgba(255,255,255,0.6); border:1px solid rgba(139,92,246,0.08); transition:all 0.2s; margin-bottom:8px; }
  .dark .delete-item-row { background:rgba(255,255,255,0.04); }
  .delete-item-row:hover { background:rgba(244,63,94,0.05); border-color:rgba(244,63,94,0.15); }
  .delete-item-row input[type=checkbox] { accent-color:#7c3aed; width:16px; height:16px; cursor:pointer; }

  /* === BIGGER HERO PRODUCT CARDS === */
  .hero-product-card { position:relative; background:rgba(255,255,255,0.85); border:1px solid rgba(139,92,246,0.14); border-radius:24px; overflow:hidden; cursor:pointer; transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1); }
  .dark .hero-product-card { background:rgba(255,255,255,0.05); }
  .hero-product-card:hover { transform:translateY(-12px) scale(1.02); box-shadow:0 30px 80px rgba(139,92,246,0.25); border-color:rgba(139,92,246,0.4); }
  .hero-product-card img { height:220px; width:100%; object-fit:cover; transition:transform 0.5s ease; }
  .hero-product-card:hover img { transform:scale(1.06); }

  /* === INTERACTIVE ICON BUTTONS === */
  .icon-btn { position:relative; display:inline-flex; align-items:center; justify-content:center; transition:all 0.25s cubic-bezier(0.34,1.4,0.64,1); }
  .icon-btn:hover { transform:scale(1.15) translateY(-2px); }
  .icon-btn:active { transform:scale(0.93); }
  .icon-btn::after { content:attr(data-tooltip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) scale(0.8); background:rgba(12,8,28,0.85); color:white; font-size:11px; font-weight:600; padding:4px 10px; border-radius:8px; white-space:nowrap; opacity:0; pointer-events:none; transition:all 0.2s; }
  .icon-btn:hover::after { opacity:1; transform:translateX(-50%) scale(1); }

  /* === PULSE NOTIFICATION DOT === */
  .notif-dot { position:absolute; top:-3px; right:-3px; width:10px; height:10px; background:#f43f5e; border-radius:50%; border:2px solid white; animation:notif-pulse 2s ease infinite; }
  @keyframes notif-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0.5)} 50%{box-shadow:0 0 0 6px rgba(244,63,94,0)} }

  /* === BETTER TEXT === */
  .text-visible { color:#1a1430 !important; }
  .dark .text-visible { color:#e2ddf5 !important; }
  .subtext-visible { color:#4b5563; }
  .dark .subtext-visible { color:#9ca3af; }

  /* === MANAGE HISTORY CHECKBOX === */
  input[type=checkbox].styled-check { accent-color:#7c3aed; transform:scale(1.2); cursor:pointer; }

  /* === CATEGORY PILL ACTIVE === */
  .cat-pill { padding:8px 18px; border-radius:99px; border:1.5px solid rgba(139,92,246,0.2); font-weight:600; font-size:0.82rem; transition:all 0.25s; background:rgba(255,255,255,0.7); cursor:pointer; }
  .dark .cat-pill { background:rgba(255,255,255,0.06); }
  .cat-pill:hover, .cat-pill.active { background:linear-gradient(135deg,#7c3aed,#06b6d4); color:white; border-color:transparent; transform:translateY(-2px); box-shadow:0 8px 20px rgba(139,92,246,0.3); }
  @keyframes reply-in { to { opacity:1; transform:translateY(0); } }

  /* ═══ NOTICEBOARD ═══ */

// ── Body scroll-lock (prevents background scroll when modals are open) ──
let _lockCount = 0;
let _savedScrollY = 0;
const lockBody = () => {
  _lockCount++;
  if (_lockCount === 1) {
    _savedScrollY = window.scrollY;
    document.body.style.position = 'fixed';
    document.body.style.top = `-${_savedScrollY}px`;
    document.body.style.width = '100%';
    document.body.classList.add('modal-open');
  }
};
const unlockBody = () => {
  _lockCount = Math.max(0, _lockCount - 1);
  if (_lockCount === 0) {
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.width = '';
    document.body.classList.remove('modal-open');
    window.scrollTo(0, _savedScrollY);
  }
};
// Patch every modal open/close globally
const _origAdd = DOMTokenList.prototype.add;
const _origRemove = DOMTokenList.prototype.remove;
DOMTokenList.prototype.add = function(...tokens) {
  _origAdd.call(this, ...tokens);
  if (tokens.includes('show') && this._el?.classList?.contains?.('modal')) lockBody();
};
DOMTokenList.prototype.remove = function(...tokens) {
  _origRemove.call(this, ...tokens);
  if (tokens.includes('show') && this._el?.classList?.contains?.('modal')) unlockBody();
};
// Simpler: just observe modal 'show' class via MutationObserver
const _modalObserver = new MutationObserver(muts => {
  muts.forEach(m => {
    if (m.type !== 'attributes' || m.attributeName !== 'class') return;
    const el = m.target;
    if (!el.classList.contains('modal') && !el.id?.includes('modal') && el.tagName !== 'DIV') return;
    const hasShow = el.classList.contains('show');
    const hadShow = m.oldValue?.includes('show');
    if (hasShow && !hadShow) lockBody();
    else if (!hasShow && hadShow) unlockBody();
  });
});
document.querySelectorAll('.modal, #welcome-overlay, #command-palette').forEach(m => {

});

  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

    const response = await fetch(url, { method: 'POST', body: formData });
    if (!response.ok) throw new Error('Upload failed.');
    const data = await response.json();
    return data.secure_url;
  } catch (error) {
    showMessage('Image upload failed. Please try again.', 'error');
    return null;
  }
};

// --- Helpers ---
const getInitials = (name) => {
  if (!name) return '?';
  const p = name.split(' ');
  return p.length > 1 ? p[0][0] + p[p.length-1][0] : name[0];
};

const showMessage = (msg, type = 'success') => {
  const isSuccess = type === 'success';
  const el = document.createElement('div');
  el.className = `px-5 py-3.5 rounded-xl shadow-2xl border text-sm font-semibold transition-all duration-500 transform translate-x-full
    ${isSuccess
      ? 'bg-white/90 dark:bg-gray-800/90 border-vit-500/30 text-vit-700 dark:text-vit-300'
      : 'bg-white/90 dark:bg-gray-800/90 border-rose-500/30 text-rose-600 dark:text-rose-400'}
    backdrop-blur-lg`;
  const icon = isSuccess ? '✓' : '✕';
  el.innerHTML = `<span class="mr-2 ${isSuccess ? 'text-vit-500' : 'text-rose-500'}">${icon}</span>${msg}`;
  messageContainer.appendChild(el);
  requestAnimationFrame(() => el.classList.remove('translate-x-full'));
  setTimeout(() => { el.classList.add('translate-x-full'); el.addEventListener('transitionend', () => el.remove()); }, 5000);
};

const applyTheme = (theme) => {
  if (theme === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
};
const toggleTheme = () => {
  const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem('theme', newTheme);
  applyTheme(newTheme);
};
applyTheme(localStorage.getItem('theme') || 'light');

const setActiveTab = (tabName, isBackAction = false) => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active','animate-tab-content'));
  if (!isBackAction && navigationHistory[navigationHistory.length-1] !== tabName) navigationHistory.push(tabName);
  if (offersUnsubscribe && tabName !== 'product-detail') offersUnsubscribe();
  const activeTab = document.getElementById(`${tabName}-tab`);
  if (activeTab) {
    switch(tabName) {
      case 'home': renderHomePage(); break;
      case 'buy': renderBuyPage(); break;
      case 'trade': renderTradePage(); break;
      case 'sell': renderSellPage(); break;
      case 'lost-and-found': renderLostAndFoundPage(); break;
      case 'my-listings': (window.renderMyListingsPageV2||renderMyListingsPage)(); break;
      case 'orders': renderOrdersPage(); break;
      case 'profile': renderProfilePage(); break;
      case 'reviews': renderReviewsPage(); break;
      case 'manage': renderManagePage(); break;
      case 'noticeboard': renderNoticeboardPage(); break;
      case 'product-detail': break;
    }
    activeTab.classList.add('active');
    setTimeout(() => activeTab.classList.add('animate-tab-content'), 10);
    // cleanup noticeboard listener when leaving
    if (tabName !== 'noticeboard' && typeof noticeUnsubscribe === 'function') noticeUnsubscribe();
  }

const validateInput = (input, fn, msg) => {
  const errEl = input.parentElement.querySelector('.error-message');
  if (!fn(input.value)) {
    input.classList.add('input-error');
    if (!errEl) input.insertAdjacentHTML('afterend', `<p class="error-message">${msg}</p>`);
    else errEl.textContent = msg;
    return false;
  } else {
    input.classList.remove('input-error');
    if (errEl) errEl.remove();
    return true;
  }
};

const triggerConfetti = () => {
  const colors = ['#7c3aed','#06b6d4','#f43f5e','#10b981','#f59e0b','#a78bfa'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.classList.add('confetti');
    p.style.left = `${window.innerWidth/2}px`;
    p.style.top = `${window.innerHeight/2}px`;
    p.style.setProperty('--color', colors[Math.floor(Math.random()*colors.length)]);
    const angle = Math.random()*360;
    const dist = Math.random()*(window.innerWidth/2);
    p.style.setProperty('--x', `${Math.cos(angle*Math.PI/180)*dist}px`);
    p.style.setProperty('--y', `${Math.sin(angle*Math.PI/180)*dist}px`);
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2200);
  }
};

const setupScrollAnimations = () => {
  const faders = document.querySelectorAll('.fade-in-section');
  // Use smaller threshold on mobile for earlier triggering
  const isMobile = window.innerWidth < 640;
  const obs = new IntersectionObserver((entries, o) => {
    entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('is-visible'); o.unobserve(entry.target); } });
  }, { threshold: isMobile ? 0.05 : 0.15, rootMargin: '0px 0px -30px 0px' });
  faders.forEach(f => obs.observe(f));
};

  const el = document.getElementById('recently-added-container');

  const featured = products.filter(p => p.status==='available').sort((a,b) => (b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0)).slice(0,4);

// --- Product Cards ---
const createProductCard = (product) => {
  const card = document.createElement('div');
  card.className = "product-card tilt-card glass rounded-2xl overflow-hidden flex flex-col cursor-pointer relative";
  card.dataset.action = 'view-details';
  card.dataset.id = product.id;

  // Wishlist state
  const wishlist = JSON.parse(localStorage.getItem('vitmart_wishlist') || '[]');
  const isWishlisted = wishlist.includes(product.id);

  let actionArea = '';
  if (product.sellerId === currentUser?.uid && (product.status==='available'||product.status==='pending')) {
    actionArea = `
      <div class="flex items-center gap-1.5 pointer-events-auto flex-wrap">
        <span class="px-2.5 py-1 bg-vit-100 dark:bg-vit-900/40 text-vit-700 dark:text-vit-300 text-xs font-bold rounded-full">Your Listing</span>
        <button class="close-listing-btn p-1.5 text-gray-400 hover:text-amber-500 rounded-lg glass transition-colors" data-id="${product.id}" title="Close listing (hide from marketplace)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        </button>
        <button class="delete-product-btn p-1.5 text-gray-400 hover:text-rose-500 rounded-lg glass transition-colors" data-id="${product.id}" title="Delete listing permanently">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>`;
  } else if (product.status === 'available') {
    actionArea = `<div class="flex flex-col gap-1.5 pointer-events-auto">
      <button class="add-to-cart-btn px-4 py-2 bg-gradient-to-r from-vit-600 to-vit-700 text-white text-xs font-bold rounded-xl shimmer-btn shadow-lg shadow-vit-500/30" data-id="${product.id}">Add to Cart</button>
    </div>`;
  }

  const soldBadge = product.status==='sold' ? '<div class="badge-sold">SOLD</div>' : product.status==='traded' ? '<div class="badge-traded">TRADED</div>' : product.status==='removed' ? '<div class="badge-sold" style="background:#6b7280">CLOSED</div>' : '';
  const tradeBadge = product.isTradeable ? '<div class="badge-tradeable">🔄 Trade</div>' : '';

  // Quick-view strip (only for available items not owned by user)
  const quickViewStrip = (product.status==='available' && product.sellerId !== currentUser?.uid) ? `
    <div class="quick-view-strip">
      <button class="quick-view-btn w-full text-center text-white text-xs font-bold py-1.5 tracking-wide opacity-90 hover:opacity-100" data-id="${product.id}">
        👁 Quick View
      </button>
    </div>` : '';

  card.innerHTML = `
    <div class="tilt-shine"></div>
    <div class="relative overflow-hidden pointer-events-none" style="position:relative">
      ${soldBadge}${tradeBadge}
      ${product.sellerId !== currentUser?.uid ? `
        <button class="wishlist-btn ${isWishlisted?'wishlisted':''}" data-id="${product.id}" title="Save to wishlist">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </button>` : ''}
      <img src="${product.imageUrl||'https://placehold.co/400x300/e8e0ff/7c3aed?text=No+Image'}" alt="${product.name}"
        class="w-full h-48 object-cover transition-transform duration-500 lightbox-trigger ${product.status!=='available'?'grayscale opacity-75':''}"
        data-src="${product.imageUrl}" loading="lazy">
      <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
      ${quickViewStrip}
    </div>
    <div class="p-4 flex flex-col flex-grow pointer-events-none">
      <p class="text-xs text-gray-400 mb-1">by ${product.sellerName||'a student'}</p>
      <h3 class="text-base font-bold text-gray-900 dark:text-white truncate">${product.name}</h3>
      <p class="text-gray-500 dark:text-gray-400 text-xs mt-1 flex-grow line-clamp-2 leading-relaxed">${product.description}</p>
      <div class="mt-3 flex justify-between items-center">
        <span class="text-xl font-black font-syne grad-text-vp">₹${product.price?.toFixed(0)||'N/A'}</span>
        <div class="pointer-events-auto">${actionArea}</div>
      </div>
    </div>`;
  return card;
};

const attachFilterListeners = (tabId, tradeOnly) => {
  const c = document.getElementById(tabId);
  c.querySelector('#search-input').addEventListener('input', () => filterAndRenderProducts(tradeOnly));
  c.querySelector('#filter-category').addEventListener('change', () => filterAndRenderProducts(tradeOnly));
  c.querySelector('#filter-price').addEventListener('change', () => filterAndRenderProducts(tradeOnly));
  c.querySelector('#filter-sort').addEventListener('change', () => filterAndRenderProducts(tradeOnly));
  c.querySelector('#reset-filters').addEventListener('click', () => {
    c.querySelector('#search-input').value = '';
    c.querySelector('#filter-category').value = 'all';
    c.querySelector('#filter-price').value = 'all';
    c.querySelector('#filter-sort').value = 'newest';
    filterAndRenderProducts(tradeOnly);
  });
};

const filterAndRenderProducts = (tradeOnly=false) => {
  const tabId = tradeOnly ? 'trade-tab' : 'buy-tab';
  const search = document.querySelector(`#${tabId} #search-input`)?.value.toLowerCase()||'';
  const category = document.querySelector(`#${tabId} #filter-category`)?.value||'all';
  const price = document.querySelector(`#${tabId} #filter-price`)?.value||'all';
  const sort = document.querySelector(`#${tabId} #filter-sort`)?.value||'newest';
  let list = products.filter(p => p.status==='available');
  if (tradeOnly) list = list.filter(p => p.isTradeable);
  if (search) list = list.filter(p => p.name.toLowerCase().includes(search));
  if (category!=='all') list = list.filter(p => p.category===category);
  if (price!=='all') { const [mn,mx]=price.split('-').map(Number); list=list.filter(p=>p.price>=mn&&p.price<=mx); }
  if (sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  else if (sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  else list.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
  renderProductList(list, tradeOnly);
};

const renderProductList = (list, tradeOnly=false) => {
  const cId = tradeOnly ? 'trade-product-list-container' : 'product-list-container';
  const c = document.getElementById(cId);
  if (!c) return;
  c.innerHTML = '';
  if (list.length > 0) list.forEach(p => c.appendChild(createProductCard(p)));
  else if (currentUser) c.innerHTML = `<p class="text-gray-400 text-center py-12 col-span-full">${tradeOnly?'No items available for trade yet.':'No products match your search. 🤷'}</p>`;
  else { for(let i=0;i<8;i++) c.appendChild(createProductSkeleton()); }
};

const renderOrdersPage = (freshOrders) => {
  // Safety net: if orders array is empty, try a direct Firestore fetch first.
  // The onSnapshot listener handles real-time, but there can be a brief window
  // (e.g. immediately after checkout) where orders is not yet updated.
  if (!freshOrders && orders.length === 0) {
    db.collection('orders').where('userId','==',currentUser.uid).get()
      .then(snap => {
        if (!snap.empty) {
          orders = snap.docs
            .map(d => ({id:d.id,...d.data()}))
            .sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
        }
        renderOrdersPage(orders);
      })
      .catch(() => renderOrdersPage(orders || []));
    return;
  }
  const c = document.getElementById('orders-tab');
  let html = `
    ${getBackButtonHTML()}
    <div class="flex justify-between items-center mb-8">
      <div><p class="text-vit-600 dark:text-vit-400 text-sm font-bold uppercase tracking-widest">History</p><h2 class="text-3xl font-black font-syne text-gray-900 dark:text-white mt-1">My Orders</h2></div>
      ${orders.length>0?`<button id="clear-order-history-btn" class="flex items-center gap-2 px-4 py-2 bg-rose-500 text-white text-sm font-bold rounded-xl hover:bg-rose-600 hover:-translate-y-0.5 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Clear</button>`:''}

  else {
    html += `<div class="space-y-5">${orders.map(order => {
      const date = order.createdAt ? new Date(order.createdAt.toDate()).toLocaleString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Just now';

const handleClearOrderHistory = () => {
  if (!currentUser) return;
  showConfirmModal("Clear your entire order history? This cannot be undone.", async () => {
    try {
      const batch = db.batch();
      const snap = await db.collection('orders').where('userId','==',currentUser.uid).get();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
      showMessage('Order history cleared.','success');
    } catch(e) { showMessage('Failed to clear history.','error'); }
  });
};

const renderMyListingsPage = () => {
  const c = document.getElementById('my-listings-tab');
  const mine = products.filter(p => p.sellerId===currentUser.uid);
  const avail = mine.filter(p => p.status==='available');
  const sold = mine.filter(p => p.status==='sold'||p.status==='traded'||p.status==='removed');
  let html = `
    ${getBackButtonHTML()}
    <div class="mb-8"><p class="text-vit-600 dark:text-vit-400 text-sm font-bold uppercase tracking-widest">Your Store</p><h2 class="text-3xl font-black font-syne text-gray-900 dark:text-white mt-1">My Listings</h2></div>`;
  if (mine.length===0) html += `<div class="glass p-12 rounded-2xl text-center"><div class="text-6xl mb-4">🏪</div><p class="text-gray-400 font-medium">No listings yet. Start selling something!</p></div>`;
  else html += `
    <div class="mb-10">
      <h3 class="text-xl font-bold font-syne mb-4 text-gray-900 dark:text-white flex items-center gap-2">
        <span class="w-7 h-7 bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-lg text-white text-xs flex items-center justify-center font-bold">${avail.length}</span>
        Active Listings
      </h3>
      <div id="available-listings" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>
    <div>
      <h3 class="text-xl font-bold font-syne mb-4 text-gray-900 dark:text-white flex items-center gap-2">
        <span class="w-7 h-7 bg-gradient-to-br from-gray-400 to-gray-500 rounded-lg text-white text-xs flex items-center justify-center font-bold">${sold.length}</span>
        Sold & Traded
      </h3>
      <div id="sold-listings" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>`;
  c.innerHTML = html;
  const aC = document.getElementById('available-listings');
  if (aC) { if(avail.length>0) avail.forEach(p=>aC.appendChild(createProductCard(p))); else aC.innerHTML=`<p class="text-gray-400 col-span-full">No active listings.</p>`; }
  const sC = document.getElementById('sold-listings');
  if (sC) {
    if (sold.length > 0) {
      sold.forEach(p => {
        const card = createProductCard(p);
        // Add re-open button for 'removed' listings
        if (p.status === 'removed') {
          const reOpenBtn = document.createElement('button');
          reOpenBtn.className = 'reopen-listing-btn w-full mt-2 py-1.5 text-xs font-bold text-emerald-600 dark:text-emerald-400 glass rounded-xl hover:-translate-y-0.5 transition-transform pointer-events-auto';
          reOpenBtn.dataset.id = p.id;
          reOpenBtn.innerHTML = '♻️ Re-open Listing';
          reOpenBtn.style.pointerEvents = 'auto';
          const cardBody = card.querySelector('.p-4.flex.flex-col');
          if (cardBody) cardBody.appendChild(reOpenBtn);
        }
        sC.appendChild(card);
      });
    } else {
      sC.innerHTML = `<p class="text-gray-400 col-span-full">No sold items yet.</p>`;
    }
  }
};

const renderMakeOfferModal = (productId) => {
  uploadedTradeOfferFile = null;
  _initTradeModal(); // pre-renders HTML only once; subsequent calls are instant
  // Reset form and update productId
  const form = document.getElementById('trade-offer-form');
  if (form) {
    form.dataset.productId = productId;
    form.reset();
    document.getElementById('trade-offer-image-preview')?.classList.add('hidden');
    document.getElementById('trade-offer-upload-prompt')?.classList.remove('hidden');
  }
  // Show immediately — no re-render needed
  requestAnimationFrame(() => tradeOfferModal.classList.add('show'));
};

const handlePopupSendMessage = (e) => {
  e.preventDefault();
  const input = document.getElementById('popup-chat-input');
  const msgs = document.getElementById('popup-chat-messages');
  if (!input||!msgs) return;
  const text = input.value.trim();
  if (!text) return;
  const filtered = filterProfanity(text);
  input.value = '';

  // User message bubble
  const userEl = document.createElement('div');
  userEl.className = 'max-w-[80%] p-3 rounded-2xl rounded-tr-sm bg-gradient-to-br from-vit-600 to-vit-700 text-white text-sm self-end';
  userEl.style.cssText = 'opacity:0;transform:translateX(10px);transition:opacity 0.15s,transform 0.15s';
  userEl.textContent = filtered;
  msgs.appendChild(userEl);
  msgs.scrollTop = msgs.scrollHeight;
  requestAnimationFrame(() => { userEl.style.opacity='1'; userEl.style.transform='translateX(0)'; });

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'bot-bubble max-w-[80%] p-3 rounded-2xl rounded-tl-sm text-sm self-start flex items-center gap-1.5';
  typingEl.innerHTML = `<span class="w-2 h-2 bg-vit-400 rounded-full animate-bounce" style="animation-delay:0ms"></span><span class="w-2 h-2 bg-vit-400 rounded-full animate-bounce" style="animation-delay:150ms"></span><span class="w-2 h-2 bg-vit-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>`;
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;

  // Match intent immediately (no delay for matching)
  let reply; let found = false;
  for (const intent of chatbotIntents) {
    for (const kw of intent.keywords) {
      if (filtered.match(kw)) { reply = intent.handler(filtered); found = true; break; }
    }
    if (found) break;
  }
  if (!found) reply = `Hmm, I didn\'t quite catch that. 🤔\n\nTry:\n- **"How do I sell an item?"**\n- **"Find a laptop under ₹8000"**\n- **"How do price offers work?"**\n- **"What is the noticeboard?"**\n\nOr type **help** for the full list.`;

  // Show typing for a natural feel (shorter = snappier)
  const typingDelay = Math.min(400 + reply.length * 0.8, 900);
  setTimeout(() => {
    typingEl.remove();
    const botEl = document.createElement('div');
    botEl.className = 'bot-bubble max-w-[85%] p-3 rounded-2xl rounded-tl-sm text-sm self-start leading-relaxed';
    botEl.style.cssText = 'opacity:0;transform:translateY(6px);transition:opacity 0.2s,transform 0.2s';
    botEl.innerHTML = reply
      .replace(/\*\*(.*?)\*\*/g, '<strong class="text-vit-600 dark:text-vit-400">$1</strong>')
      .replace(/\n/g, '<br>');
    msgs.appendChild(botEl);
    msgs.scrollTop = msgs.scrollHeight;
    requestAnimationFrame(() => { botEl.style.opacity='1'; botEl.style.transform='translateY(0)'; });
  }, typingDelay);
};

  const btn = document.getElementById('confirm-payment-btn');
  btn.disabled=true; btn.innerHTML=`<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mx-auto"></div>`;
  try {
    await new Promise(r=>setTimeout(r,1500));
    const items = Object.values(cart);
    const total = items.reduce((s,i)=>s+i.price*i.quantity,0);
    const batch = db.batch();
    const orderRef = db.collection('orders').doc();
    batch.set(orderRef,{userId:currentUser.uid,userName:currentUser.displayName,createdAt:firebase.firestore.FieldValue.serverTimestamp(),total,items:items.map(({id,...rest})=>({...rest}))});
    items.forEach(item => { const pr = db.collection('products').doc(item.id); batch.update(pr,{status:'sold'}); });
    const snap = await db.collection('carts').doc(currentUser.uid).collection('items').get();
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    checkoutModal.classList.remove('show');
    triggerConfetti();
    showMessage('Purchase complete! 🎉 Redirecting to your orders…','success');
    // Notify sellers of the purchase
    if (window._afterCheckoutNotify) window._afterCheckoutNotify(items);
    // Track each purchased item as a strong buy signal
    items.forEach(item => { const bp = products.find(p=>p.id===item.id||p.id===item.productId); if(bp) recLog(bp,'buy'); });
    // Wait for the onSnapshot listener to pick up the new order, then navigate.
    setTimeout(() => setActiveTab('orders'), 1200);
  } catch(e) { showMessage('Payment failed: '+(e.message||e.code||'Unknown error. Check your connection.'),'error'); console.error('Checkout error:',e); }

const handleAcceptOffer = async (offerId, productId, offererId) => {
  showConfirmModal("Accept this offer? Item will be marked as Traded.", async () => {
    const pr = db.collection('products').doc(productId);
    const or = pr.collection('offers').doc(offerId);
    try {
      const product = products.find(p => p.id === productId);
      const batch = db.batch();
      batch.update(pr, {status:'traded'});
      batch.update(or, {status:'accepted'});
      // Reject remaining pending offers
      const pendingSnap = await pr.collection('offers').where('status','==','pending').get();
      pendingSnap.forEach(d => { if (d.id!==offerId) batch.update(d.ref,{status:'rejected'}); });
      // Create an order record for the seller so trade appears in My Orders
      if (product) {
        const orderRef = db.collection('orders').doc();
        batch.set(orderRef, {
          userId: currentUser.uid,
          userName: currentUser.displayName,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          total: 0,
          orderType: 'trade',
          items: [{
            productId: product.id,
            name: product.name,
            price: product.price,
            imageUrl: product.imageUrl || '',
            quantity: 1
          }]
        });
      }
      // Notify the offerer that their trade was accepted
      await sendNotification(offererId, {
        type: 'trade_accepted',
        title: '🔄 Trade Offer Accepted!',
        body: product ? `Your trade offer for "${product.name}" was accepted by the seller.` : 'Your trade offer was accepted!',
        productId
      });
      await batch.commit();
      showMessage('Offer accepted! Item marked as traded.','success');
    } catch(e) { showMessage(`Error: ${e.message}`,'error'); }
  });
};

const handleRejectOffer = async (offerId, productId) => {

// --- Upload Helpers ---
function setupImageUploadListeners(dropZoneId, fileInputId, previewId, promptId, cb) {
  const dz = document.getElementById(dropZoneId);
  const fi = document.getElementById(fileInputId);
  const pv = document.getElementById(previewId);
  const pr = document.getElementById(promptId);
  if (!dz) return;
  const handle = (file) => {
    if (file?.type.startsWith('image/')) {
      cb(file);
      const r = new FileReader();
      r.onload = e => { pv.src=e.target.result; pv.classList.remove('hidden'); pr.classList.add('hidden'); };
      r.readAsDataURL(file);
    } else showMessage('Please select a valid image.','error');
  };
  dz.onclick = () => fi.click();
  fi.onchange = e => handle(e.target.files[0]);
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag-over'); handle(e.dataTransfer.files[0]); };
}

function setupPfpUploadListeners() {
  const dz = document.getElementById('pfp-drop-zone');
  const fi = document.getElementById('pfp-upload');
  const pv = document.getElementById('pfp-preview');
  const pr = document.getElementById('pfp-upload-prompt');
  const ag = document.getElementById('avatar-grid');
  if (!dz) return;
  const handle = (file) => {
    if (file?.type.startsWith('image/')) {
      uploadedPfpFile = file; selectedAvatarUrl = null;
      const r = new FileReader();
      r.onload = e => { pv.src=e.target.result; pr.classList.add('hidden'); pv.classList.remove('hidden'); ag.querySelectorAll('.avatar-option').forEach(el=>el.style.borderColor='transparent'); };
      r.readAsDataURL(file);
    } else showMessage('Please select a valid image.','error');
  };
  dz.onclick = () => fi.click();
  fi.onchange = e => handle(e.target.files[0]);
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag-over'); handle(e.dataTransfer.files[0]); };
  ag.addEventListener('click', e => {
    const av = e.target.closest('.avatar-option');
    if (av) {
      uploadedPfpFile = null; selectedAvatarUrl = av.dataset.url;
      pr.classList.remove('hidden'); pv.classList.add('hidden');
      ag.querySelectorAll('.avatar-option').forEach(el=>el.style.borderColor='transparent');
      av.style.borderColor = '#7c3aed';
    }
  });
}

// --- App Init ---

// ── PUBLIC DATA: products & lost-and-found are readable by everyone.
//    Start these listeners IMMEDIATELY, before auth resolves, so the
//    marketplace is populated the instant the page/UI becomes visible.
//    This also fixes the race condition where setActiveTab('home') was
//    called before the first onSnapshot fired after login. ──────────────
let _publicListenersStarted = false;
const startPublicListeners = () => {
  if (_publicListenersStarted) return;
  _publicListenersStarted = true;

  productUnsubscribe = db.collection('products').orderBy('createdAt','desc').onSnapshot(snap => {
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Re-render whichever content tab is currently showing
    const at = document.querySelector('.tab-content.active');
    if (at && at.id !== 'product-detail-tab') {
      setActiveTab(at.id.replace('-tab', ''), true);
    }
  }, err => {
    console.error('Products listener error:', err);
  });

  lostAndFoundUnsubscribe = db.collection('lost_and_found').orderBy('createdAt','desc').onSnapshot(snap => {
    lostAndFoundItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const at = document.querySelector('.tab-content.active');
    if (at && at.id === 'lost-and-found-tab') filterAndRenderLostFoundItems();
    else if (at && at.id === 'home-tab') renderHomepageLostAndFoundPreview();
  }, err => {
    console.error('Lost & Found listener error:', err);
  });
};

// Kick off public listeners right away (no auth needed)
startPublicListeners();

auth.onAuthStateChanged(user => {
  if (emailVerificationInterval) clearInterval(emailVerificationInterval);
  // Only tear down USER-SPECIFIC listeners; public ones stay alive
  cartUnsubscribe(); ordersUnsubscribe(); offersUnsubscribe();

  if (user && user.emailVerified) {
    db.collection('users').doc(user.uid).get().then(d => {
      if (!d.exists) db.collection('users').doc(user.uid).set({uid:user.uid,displayName:user.displayName,email:user.email,photoURL:user.photoURL,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    currentUser = user;
    authModal.classList.remove('show');
    if (!sessionStorage.getItem('welcomeShown')) { showWelcomeAnimation(user); sessionStorage.setItem('welcomeShown','true'); }
    else appContainer.classList.remove('opacity-0');

    // Products & L&F are already running — no need to restart them.
    // Just wire up the user-specific listeners.

    cartUnsubscribe = db.collection('carts').doc(currentUser.uid).collection('items').onSnapshot(snap => {
      cart = {};
      snap.forEach(d => { cart[d.id]={id:d.id,...d.data()}; });
      renderCart();
    });
    ordersUnsubscribe = db.collection('orders').where('userId','==',currentUser.uid).onSnapshot(snap => {
      orders = snap.docs
        .map(d => ({id:d.id,...d.data()}))
        .sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      const at = document.querySelector('.tab-content.active');
      if (at && at.id === 'orders-tab') renderOrdersPage();
      if (at && at.id === 'manage-tab') renderManagePage();
    }, err => {
      console.error('Orders listener error:', err.code, err.message);
      db.collection('orders').where('userId','==',currentUser.uid).get().then(snap => {
        orders = snap.docs
          .map(d => ({id:d.id,...d.data()}))
          .sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
        const at = document.querySelector('.tab-content.active');
        if (at && at.id === 'orders-tab') renderOrdersPage();
      }).catch(e => console.error('Orders fallback fetch failed:', e));
    });

    renderHeaderActions(); renderPopupChat();

    // If products are already loaded (listener was running before auth), render home now.
    // Otherwise the onSnapshot callback will re-render once data arrives.
    setActiveTab('home');
    setTimeout(() => document.dispatchEvent(new Event('vitmart-user-ready')), 100);
  } else {
    currentUser = null;
    // DO NOT clear products or lostAndFoundItems — those are public and
    // already streaming. Only clear user-specific state.
    cart = {}; orders = [];
    navigationHistory = ['home'];
    sessionStorage.removeItem('welcomeShown');
    appContainer.classList.add('opacity-0');
    authModal.classList.add('show');
    if (user && !user.emailVerified) renderAuthModal('verify');
    else renderAuthModal('signin');
    renderHeaderActions();
    popupChatWidget.innerHTML = '';
  }
});

// ══════════════════════════════════════════════
const cursorInner = document.getElementById('cursor-inner');
const cursorOuter = document.getElementById('cursor-outer');
// Only run cursor logic on non-touch devices
const isTouchDevice = () => window.matchMedia('(hover: none)').matches;
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let outerX = mouseX, outerY = mouseY;

const animateCursor = () => {
  // Outer follows with smooth lag
  outerX += (mouseX - outerX) * 0.13;
  outerY += (mouseY - outerY) * 0.13;
  if (cursorOuter) {
    cursorOuter.style.left = outerX + 'px';
    cursorOuter.style.top = outerY + 'px';
  }
  requestAnimationFrame(animateCursor);
};
if (!isTouchDevice()) animateCursor();

document.addEventListener('mousemove', e => {
  if (isTouchDevice()) return;
  mouseX = e.clientX; mouseY = e.clientY;
  if (cursorInner) {
    cursorInner.style.left = e.clientX + 'px';
    cursorInner.style.top = e.clientY + 'px';
  }
}, { passive: true });
document.addEventListener('mouseleave', () => {
  if (cursorInner) cursorInner.style.opacity = '0';
  if (cursorOuter) cursorOuter.style.opacity = '0';
});
document.addEventListener('mouseenter', () => {
  if (cursorInner) cursorInner.style.opacity = '1';
  if (cursorOuter) cursorOuter.style.opacity = '1';
});
document.addEventListener('mousedown', () => cursorInner?.classList.add('clicking'));
document.addEventListener('mouseup', () => cursorInner?.classList.remove('clicking'));
document.body.addEventListener('mouseover', e => {
  if (e.target.closest('button, a, [data-tab], .product-card, .category-card, input, select, textarea, label, .nav-item')) {

}, { passive: true });
document.body.addEventListener('mouseout', e => {

const renderCmdResults = (query) => {
  if (!cmdResults) return;
  const q = query.toLowerCase().trim();
  let filtered = cmdCommands;
  if (q) filtered = cmdCommands.filter(c => c.label.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q));

  // Also search products
  const productResults = q ? products.filter(p => p.name.toLowerCase().includes(q) && p.status==='available').slice(0,3).map(p => ({
    icon:'📌', label:p.name, desc:`₹${p.price} · ${p.category}`,
    action:()=>{ renderProductDetailPage(p); setActiveTab('product-detail'); },
    bg:'bg-gray-100 dark:bg-gray-800'
  })) : [];

  const all = [...filtered, ...productResults].slice(0, 8);
  cmdSelectedIdx = -1;

  cmdResults.innerHTML = all.length === 0
    ? `<p class="text-center text-gray-400 py-6 text-sm">No results for "${query}"</p>`
    : all.map((cmd, i) => `
      <div class="cmd-item" data-cmd-idx="${i}">
        <div class="cmd-item-icon ${cmd.bg}">${cmd.icon}</div>
        <div class="flex-grow min-w-0">
          <p class="font-semibold text-gray-900 dark:text-white text-sm truncate">${cmd.label}</p>
          <p class="text-xs text-gray-400 truncate">${cmd.desc}</p>

      </div>`).join('');

  cmdResults.querySelectorAll('.cmd-item').forEach((el, i) => {
    el.addEventListener('click', () => { all[i].action(); closeCmdPalette(); });
  });
};

cmdInput?.addEventListener('input', e => renderCmdResults(e.target.value));

cmdInput?.addEventListener('keydown', e => {
  const items = cmdResults?.querySelectorAll('.cmd-item');
  if (!items?.length) return;
  if (e.key==='ArrowDown') { e.preventDefault(); cmdSelectedIdx = Math.min(cmdSelectedIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('selected', i===cmdSelectedIdx)); items[cmdSelectedIdx]?.scrollIntoView({block:'nearest'}); }
  else if (e.key==='ArrowUp') { e.preventDefault(); cmdSelectedIdx = Math.max(cmdSelectedIdx-1, 0); items.forEach((el,i) => el.classList.toggle('selected', i===cmdSelectedIdx)); items[cmdSelectedIdx]?.scrollIntoView({block:'nearest'}); }
  else if (e.key==='Enter') { if (cmdSelectedIdx >= 0) items[cmdSelectedIdx]?.click(); else if (items[0]) items[0].click(); }
});

  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); cmdPalette?.classList.contains('show') ? closeCmdPalette() : openCmdPalette(); }

});
